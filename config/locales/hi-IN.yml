      title: "2. दर्ज किए गए घटनाओं की संख्या\n \n \n "
      reporting_site: "रिपोर्टिंग स्थल / रिपोर्टिंग साइट"
      helptext: |
        यह संकेतक दर्शाता है कि प्रत्येक रिपोर्टिंग साइट पर हर महीने कितनी नई घटनाएँ दर्ज की जाती हैं।
        रिपोर्टिंग साइट से आशय उस स्थान से है जहाँ उपयोगकर्ता संगठन सेवाएँ प्रदान कर रहा है और जहाँ घटना सेवा प्रदाता को रिपोर्ट की गई है।
