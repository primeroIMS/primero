          kpi_completed_case_action_plans:
            explanation: "उपयोगकर्ता जिन सक्रिय केस तक पहुंच रखता है, उनमें से कितनों में केस एक्शन प्लान पूरा हुआ है, यह देखने की क्षमता"
            label: समाप्त केस एक्शन प्लान
          kpi_completed_case_safety_plans:
            explanation: "उपयोगकर्ता जिन सक्रिय केस तक पहुंच रखता है, उनमें से कितनों में सुरक्षा योजना की आवश्यकता थी और कितनी पूरी हुई, यह देखने की क्षमता"
            label: पूर्ण केस सुरक्षा योजना
          kpi_completed_supervisor_approved_case_action_plans:
            explanation: "उपयोगकर्ता जिन सक्रिय केस तक पहुंच रखता है, उनमें से कितनों में सुपरवाइज़र द्वारा अनुमोदित केस एक्शन प्लान पूरा किया गया, यह देखने की क्षमता"
            label: सुपरवाइज़र द्वारा अनुमोदित पूर्ण एक्शन प्लान
          kpi_goal_progress_per_need:
            explanation: "उपयोगकर्ता जिन केस तक पहुंच रखता है, उनमें प्रत्येक आवश्यकता श्रेणी के लक्ष्यों में से कितने पूरे हुए, यह देखने की क्षमता"
            label: लक्ष्यों की प्रगति
          kpi_number_of_cases:
            explanation: उपयोगकर्ता यह देखने में सक्षम कि प्रत्येक साइट पर प्रति माह कितने नए रिपोर्ट किए गए केस खोले गए
            label: केस की संख्या
          kpi_number_of_incidents:
            explanation: "उपयोगकर्ता यह देखने में सक्षम कि प्रत्येक साइट पर प्रति माह कितनी नई रिपोर्ट की गई घटनाएँ खोली गईं "
            label: घटनाओं की संख्या
          kpi_reporting_delay:
            explanation: "उपयोगकर्ता जिन सभी घटनाओं तक पहुंच रखता है, उनमें यह देखने की क्षमता कि पीड़िता ने GBV का अनुभव करने और सेवा प्रदाता को रिपोर्ट करने के बीच कितने दिन बीते "
            label: रिपोर्टिंग में देरी
          kpi_services_provided:
            explanation: "उपयोगकर्ता जिन सभी केस तक पहुंच रखता है, उनमें यह देखने की क्षमता कि संगठन ने इन-हाउस कौन-कौन सी सेवाएँ प्रदान की हैं"
            label: उपलब्ध की गई सेवाएँ
          kpi_supervisor_to_caseworker_ratio:
            explanation: "उपयोगकर्ता यह देखने में सक्षम कि केसवर्कर और सुपरवाइज़र का अनुपात क्या है "
            label: सुपरवाइज़र से केसवर्कर अनुपात
          kpi_time_from_case_open_to_close:
            explanation: "उपयोगकर्ता जिन सभी केस तक पहुंच रखता है, उनमें यह देखने की क्षमता कि केस कितने समय तक खुले रखे जाते हैं"
            label: केस खुलने से बंद होने तक का समय
        label: प्रदर्शन का मुख्य संकेत
      agency:
        actions:
          assign:
            explanation: "उपयोगकर्ता खाता बनाते या संपादित करते समय एजेंसी चुनने की क्षमता। यदि वर्तमान उपयोगकर्ता के पास यह अनुमति और \"Agency Read\" अनुमति दोनों हैं, तो वे केवल अपने ही एजेंसी में उपयोगकर्ता जोड़ पाएंगे। "
            label: असाइन करें
          create:
            explanation: एजेंसी बनाने की क्षमता
            label: बनाएँ
          manage:
            explanation: 'उपयोगकर्ता को एजेंसियों पर सभी उपलब्ध कार्य करने की अनुमति देता है। "Manage" अनुमति का अर्थ मूल रूप से "सब कुछ" है। महत्वपूर्ण: यह नई एजेंसी बनाने की क्षमता भी देती है।'
            label: प्रबंधन करें (इस संसाधन प्रकार के लिए सभी अनुमतियाँ)
          read:
            explanation: एजेंसियाँ देखने की क्षमता
            label: "देखें "
          write:
            explanation: एजेंसियों की जानकारी संपादित करने की क्षमता
            label: बदलें
        explanation: ऐसे संगठन का प्रतिनिधित्व करता है जिनके सदस्य Primero का उपयोग करते हैं
        label: Agency
      audit_log:
        actions:
          read:
            explanation: "उपयोगकर्ता को सिस्टम में किए गए सभी कार्यों की सूची देखने और फ़िल्टर करने की अनुमति देता है, जिसे उपयोगकर्ता, कार्य का प्रकार, रिकॉर्ड ID, और कार्य के समय के आधार पर विभाजित किया गया है। यह राष्ट्रीय स्तर या एजेंसी स्तर के प्रशासकों के लिए सबसे उपयुक्त है, क्योंकि यह सिस्टम में सभी उपयोगकर्ताओं द्वारा किए गए कार्यों को दिखाता है। कृपया ध्यान दें कि ऑडिट लॉग में प्रत्येक कार्य में शामिल रिकॉर्ड की कोई व्यक्तिगत पहचान योग्य जानकारी नहीं दिखाई जाती।"
            label: देखें
        explanation: "सिस्टम में किए गए सभी कार्यों की फ़िल्टर करने योग्य सूची। इसमें केस, घटनाएँ या ट्रेसिंग अनुरोधों की कोई पहचान योग्य जानकारी शामिल नहीं है।"
        label: ऑडिट लॉग
      case:
        actions:
          add_note:
            explanation: "उपयोगकर्ता को \"Notes\" सबफ़ॉर्म (जिसे कभी-कभी \"Comments\" भी कहा जाता है) में एक एंट्री जोड़ने की अनुमति देता है। उपयोगकर्ता यह \"Add Notes\" बटन पर क्लिक करके केस शो पेज पर करता है। यह क्रिया विशेष रूप से उन मैनेजरों के लिए उपयोगी है जिनके पास केस संपादित करने की क्षमता नहीं है, लेकिन वे केसवर्कर के लिए केस में रिमाइंडर जोड़ना चाहते हैं। इस तरह, नोट जोड़ना फ्लैग जोड़ने के समान है। नोट जोड़ने का फायदा यह है कि जब मैनेजर किसी केस में नोट जोड़ता है, तो केसवर्कर को उनके मोबाइल डिवाइस पर केस देखने पर उस नोट का नोटिफिकेशन दिखाई देगा। "
            label: केस में नोट जोड़ें
          add_registry_record:
            explanation: "उपयोगकर्ता को रजिस्ट्री विवरण फ़ॉर्म से किसी केस से रजिस्ट्री लिंक करने की अनुमति देता है। इसके अलावा, उपयोगकर्ता किसी भी पहले से लिंक की गई रजिस्ट्री को केस से अनलिंक भी कर सकता है।"
            label: केस से रजिस्ट्री रिकॉर्ड जोड़ें / अपडेट करें
          approve_action_plan:
            explanation: "मैनेजर को अपने केस वर्करों के केस के लिए %{approval_label} मंजूरी देने की अनुमति देता है।"
            label: "%{approval_label}को मंजूर करें"
          approve_assessment:
            explanation: "मैनेजर को अपने केस वर्करों के केस के लिए %{approval_label} को मंजूर करने की अनुमति देता है।"
            label: "%{approval_label}फॉर्म को मंजूर करें"
          approve_bia:
            explanation: "मैनेजर को अपने केस वर्करों के केस के %{approval_label}को मंजूर करने की सुविधा देता है।"
            label: "%{approval_label}फॉर्म को मंजूर करें"
          approve_case_plan:
            explanation: "मैनेजर को अपने केस वर्करों के केस के %{approval_label}को मंजूर करने की अनुमति देता है।"
            label: "%{approval_label} को मंजूर करें"
          approve_closure:
            explanation: "यह प्रबंधक को उनके केस वर्करों के मामलों के लिए %{approval_label}को स्वीकृत करने की अनुमति देता है।"
            label: "%{approval_label}फॉर्म को स्वीकृत करें"
          approve_gbv_closure:
            explanation: "यह प्रबंधक को उनके केस वर्करों के मामलों के %{approval_label}को मंज़ूरी देने की अनुमति देता है।"
            label: "%{approval_label} फॉर्म स्वीकृत करें"
          self_approve:
            explanation: "डिफ़ॉल्ट रूप से, उपयोगकर्ता अपने स्वयं के केस को मंजूरी नहीं दे सकते। इस अनुमति के साथ, उपयोगकर्ता किसी भी केस को मंजूरी दे सकता है जिस तक उसकी पहुंच है, भले ही वह रिकॉर्ड का मालिक ही क्यों न हो। "
            label: अपने केस को मंजूरी दें
          assign:
            explanation: "Allows a user to send a case from its original record owner to any other user in the system. No child consent is needed for this action. Unlike with transfers, the recipient is not given the chance to accept or reject the assignment."
            label: सौंपें
          assign_within_agency:
            explanation: "उपयोगकर्ता को किसी केस को उसके मूल रिकॉर्ड मालिक से वर्तमान उपयोगकर्ता की एजेंसी के किसी अन्य उपयोगकर्ता को भेजने की अनुमति देता है। इस क्रिया के लिए किसी बच्चे की सहमति की आवश्यकता नहीं है। ट्रांसफर के विपरीत, प्राप्तकर्ता को असाइनमेंट स्वीकार या अस्वीकार करने का विकल्प नहीं दिया जाता है।"
            label: "अपनी एजेंसी के किसी उपयोगकर्ता को असाइन करें "
          assign_within_user_group:
            explanation: "Allows a user to send a case from its original record owner to any other user in the current user's user groups. No child consent is needed for this action. Unlike with transfers, the recipient is not given the chance to accept or reject the assignment."
            label: मेरे उपयोगकर्ता समूह के किसी सदस्य को असाइन करें
          create_case_from_referral:
            label: एक रेफरल से नया केस बनाएं।
            explanation: उपयोगकर्ता रेफरल से नया केस बना सकता है।
          change_log:
            explanation: उपयोगकर्ता रिकॉर्ड बनने के बाद किए गए सभी बदलावों का रिकॉर्ड देख सकता है। इसमें सभी फ़ील्ड्स के दर्ज किए गए मान शामिल हैं।
            label: परिवर्तन लॉग
          access_log:
            explanation: उपयोगकर्ता रिकॉर्ड बनने के बाद अन्य उपयोगकर्ताओं द्वारा किए गए सभी एक्सेस (देखना और अपडेट) देख सकता है।
            label: एक्सेस रिकॉर्ड
          close:
            explanation: उपयोगकर्ता खुले केस को बंद कर सकता है।
            label: बंद करें
          consent_override:
            explanation: "उपयोगकर्ता ऐसे केस के लिए रेफरल या ट्रांसफर कर सकता है, जिसने सहमति नहीं दी है।"
            label: रेफरल या ट्रांसफर करते समय सहमति की कमी को ओवरराइड करें
          create:
            explanation: केस बनाने की क्षमता
            label: बनाएँ
          display_view_page:
            explanation: "दि कोई उपयोगकर्ता किसी ऐसे मामले की खोज करता है, जिस तक उसकी पहुँच नहीं है, तो यह अनुमति उसे उस मामले की सिर्फ बुनियादी जानकारी देखने के लिए एक छोटा पॉप-अप (modal) दिखाती है, भले ही वह पूरे मामले की जानकारी न देख सके। इस \"View Modal\" में जो जानकारी दिखाई देती है, वह उन्हीं फ़ील्ड्स से आती है जिन्हें \"Short Form में दिखाएँ\" के लिए चुना गया है। यह modal उन उपयोगकर्ताओं के लिए भी मददगार है जो परिवार की खोज और फिर से मिलाने (Family Tracing और Reconnecting) के काम कर रहे हैं, क्योंकि यह \"View Modal\" उन मामलों की समीक्षा करते समय उपलब्ध होता है, जो Tracing Request के लिए \"संभावित मिलान (Possible Matches)\" के रूप में दिखाई देते हैं।"
            label: व्यू पेज दिखाएँ
          enable_disable_record:
            explanation: "किसी मामले को चालू या बंद करने का विकल्प। बंद किए हुए मामले सामान्य सूची में नहीं दिखते। उपयोगकर्ता फ़िल्टर लगाकर बंद किए हुए मामले देख सकते हैं। क्योंकि Primero में मामले हटाने का विकल्प नहीं है, कोई व्यक्ति गलती से बनाए गए या गलत जानकारी वाले मामले को बंद करना चाह सकता है।"
            label: चालू / बंद
          export_case_pdf:
            explanation: "उपयोगकर्ता मामले की सूची या मामले के पेज से PDF फ़ाइल बना सकता है। इस फ़ाइल में सिर्फ वही जानकारी होगी जो उपयोगकर्ता देख सकता है। उपयोगकर्ता एक, कई या सभी मामलों के लिए PDF बना सकता है। PDF में जानकारी पहले मामले के हिसाब से और फिर उस फॉर्म के हिसाब से दिखाई जाती है जिसमें जानकारी रखी गई है।"
            label: मामले की PDF बनाना / एक्सपोर्ट करना
          export_csv:
            explanation: 'उपयोगकर्ता मामले की सूची या पेज से CSV फ़ाइल बना सकता है। इसमें सिर्फ वही जानकारी होगी जो उपयोगकर्ता देख सकता है। उपयोगकर्ता एक, कई या सभी मामलों के लिए CSV बना सकता है। ध्यान दें: CSV में गैर-लैटिन भाषा के अक्षर (जैसे अरबी, बंगला) सही तरीके से नहीं दिखते।'
            label: फ़ाइल बनाना / एक्सपोर्ट करना
          export_custom:
            explanation: "उपयोगकर्ता मामले की सूची या पेज से XLS फ़ाइल बना सकता है। इसमें उपयोगकर्ता द्वारा चुने गए फॉर्म या जानकारी शामिल हो सकती है। उपयोगकर्ता एक, कई या सभी मामलों के लिए यह XLS फ़ाइल बना सकता है। इस XLS में हर फॉर्म अपने अलग टैब में दिखता है। उपयोगकर्ता Custom Export modal का उपयोग करके यह चुन सकते हैं कि कौन से फॉर्म या जानकारी फ़ाइल में शामिल हों। ध्यान दें: उपयोगकर्ता केवल वही फॉर्म और जानकारी शामिल कर सकते हैं जो उन्हें एप्लिकेशन में मामला देखते समय दिखाई देती हैं।"
            label: कस्टम एक्सपोर्ट करना
          export_duplicate_id_csv:
            explanation: "यह CSV फ़ाइल बनाता है जिसमें सिर्फ वही मामले शामिल होते हैं जिनका National ID (राष्ट्रीय पहचान) एक जैसा है (लेबल अलग भी हो सकता है, सेटिंग के हिसाब से)। इसे सिर्फ मामले की सूची वाले पेज से बनाया जा सकता है।"
            label: डुप्लिकेट एक्सपोर्ट करना
          export_json:
            explanation: "उपयोगकर्ता मामले की सूची या पेज से JSON फ़ाइल बना सकता है। इसमें सिर्फ वही जानकारी होगी जो उपयोगकर्ता देख सकता है। उपयोगकर्ता एक, कई या सभी मामलों के लिए JSON फ़ाइल बना सकता है। यह तरीका मुख्य रूप से उन लोगों के लिए है जो मौजूदा Primero सिस्टम से मामले निकालकर किसी दूसरे Primero सिस्टम या किसी अन्य जानकारी प्रबंधन सिस्टम में डालना चाहते हैं। JSON फ़ाइल कंप्यूटर के लिए समझने योग्य होती है और आम उपयोगकर्ताओं के लिए आसान नहीं है।\n \n \n "
            label: JSON फ़ाइल बनाना / एक्सपोर्ट करना
          export_list_view_csv:
            explanation: उपयोगकर्ता मामले की सूची वाले पेज से CSV फ़ाइल बना सकता है। इसमें वही जानकारी होगी जो उस उपयोगकर्ता को सूची में दिखाई देती है। इसे सिर्फ सूची वाले पेज से ही बनाया जा सकता है।
            label: सूची वाला CSV फ़ाइल एक्सपोर्ट करना
          export_pdf:
            explanation: "उपयोगकर्ता मामले की सूची या पेज से PDF फ़ाइल बना सकता है। इसमें सिर्फ वही जानकारी होगी जो उपयोगकर्ता देख सकता है। उपयोगकर्ता एक, कई या सभी मामलों के लिए PDF बना सकता है। PDF में जानकारी पहले मामले के हिसाब से और फिर उस फॉर्म के हिसाब से दिखाई जाती है जिसमें जानकारी रखी गई है।"
            label: मामले की PDF फ़ाइल बनाना / एक्सपोर्ट करना
          export_photowall:
            explanation: उपयोगकर्ता मामले की सूची वाले पेज से एक फ़ाइल बना सकता है जिसमें चुने गए सभी मामलों की तस्वीरें हों। यह तरीका मुख्य रूप से परिवार की खोज और मिलाने (Family Tracing और Reconnecting) के काम में इस्तेमाल होता है। इसे सिर्फ सूची वाले पेज से ही किया जा सकता है।
            label: फोटोवॉल एक्सपोर्ट करना / तस्वीरों की फ़ाइल बनाना
          export_unhcr_csv:
            label: फ़ाइल बनाना / एक्सपोर्ट करना
            explanation: हटाया गया - अब यह सुविधा इस्तेमाल में नहीं है
          export_xls:
            explanation: 'उपयोगकर्ता मामले की सूची या पेज से XLS फ़ाइल बना सकता है। इसमें सिर्फ वही जानकारी होगी जो उपयोगकर्ता देख सकता है। उपयोगकर्ता एक, कई या सभी मामलों के लिए XLS बना सकता है। इस फ़ाइल में हर फॉर्म अपने अलग टैब में दिखेगा। ध्यान दें: XLS फ़ाइल में गैर-लैटिन भाषा के अक्षर (जैसे अरबी, बंगला) सही तरीके से दिखते हैं, जबकि CSV में नहीं।'
            label: Excel (XLS फ़ाइल) एक्सपोर्ट करना
          find_tracing_match:
            explanation: "यह केवल परिवार की खोज और मिलाने (Family Tracing और Reconnecting) के काम के लिए इस्तेमाल होता है। जिन उपयोगकर्ताओं के पास यह अनुमति है, उन्हें मामले के पेज पर \"Find Tracing Match\" बटन दिखाई देगा। इसे क्लिक करने पर उन्हें सिस्टम में उन ट्रेसिंग रिक्वेस्ट की सूची दिखाई देगी जो उनके मामले से मिल सकती हैं।\n \n \n "
            label: मामले से ट्रेसिंग मैच ढूँढना
          flag:
            explanation: "किसी मामले पर निशान (flag) लगाने का विकल्प। जिन उपयोगकर्ताओं के पास यह अनुमति है, वे अपने द्वारा लगाए गए निशान हटा भी सकते हैं।"
            label: फ़्लैग
          resolve_any_flag:
            explanation: "उपयोगकर्ता किसी भी मामले पर लगे निशान (Flag) को सुलझा सकता है, चाहे उसे किसी और ने लगाया हो।"
            label: किसी भी निशान (Flag) को सुलझाना
          flag_update:
            explanation: "उपयोगकर्ता किसी भी मामले पर लगे निशान (Flag) को बदल सकता है, चाहे उसे किसी और ने लगाया हो।"
            label: (Flag) अपडेट करना
          import:
            explanation: "उपयोगकर्ता CSV, Excel, या JSON फ़ाइल से एक या कई नए मामले बना सकता है। फ़ाइल का फॉर्मेट सही होना बहुत जरूरी है, तभी जानकारी सही तरीके से आएगी। यह सुविधा केवल उन एडमिन उपयोगकर्ताओं के लिए है जिनके पास तकनीकी ज्ञान और Primero में डेटा का सही फॉर्मेट समझने की क्षमता है। इसे सिर्फ मामले की सूची वाले पेज से ही किया जा सकता है।"
            label: इम्पोर्ट करना /फ़ाइल लाना
          incident_details_from_case:
            explanation: "उपयोगकर्ता उस मामले में Incident Details सबफ़ॉर्म में जानकारी जोड़ सकता है जिसे उसने खोज परिणाम में देखा है, लेकिन जिस पर उसकी पहुँच नहीं है। यह काम उपयोगकर्ता खोज परिणाम पेज से करता है: पहले एक या कई मामले चुनें, फिर Actions मेन्यू से \"Add Incident\" चुनें। इसके बाद एक पॉप-अप (modal) खुलता है जिसमें Incident Details सबफ़ॉर्म की सारी जानकारी होती है, और उपयोगकर्ता यहाँ सेवा से जुड़ी जानकारी भरकर भेज सकता है। क्योंकि यह काम केवल खोज परिणाम पेज से ही किया जा सकता है, यह अनुमति केवल उन रोल्स के लिए सही है जिनके पास \"Search for case records owned by other users\" की भी अनुमति है।"
            label: खोज परिणाम पेज से किसी अन्य उपयोगकर्ता के मामले में Incident Details जोड़ना
          incident_from_case:
            explanation: "यह अनुमति उपयोगकर्ता को \"Create Incident\" बटन क्लिक करने देती है। इससे एक नया incident बनता है जिसमें कुछ जानकारी मामले से कॉपी की जा सकती है। GBV मामलों में यह बटन show case पेज के ऊपर होता है और पूरे मामले की जानकारी से जुड़ा होता है। कुछ incident-tracking सिस्टम में यह बटन \"Incident Details\" सबफ़ॉर्म पर होता है। इस स्थिति में, कुछ जानकारी उसी सबफ़ॉर्म से कॉपी की जा सकती है जहाँ बटन क्लिक किया गया, और साथ ही पूरे मामले से भी। मतलब नया बनता हुआ incident \"Type of Violence\" जैसे फ़ील्ड को सबफ़ॉर्म से ले सकता है, और साथ ही मामले की उम्र और लिंग जैसी जानकारी भी शामिल हो सकती है। ध्यान दें: यह अनुमति उपयोगकर्ता को बनाए गए incident का लिंक देखने की सुविधा भी देती है।"
            label: किसी मामले से नया घटना बनाना
          remove_alert:
            explanation: "यह अनुमति उपयोगकर्ता को किसी मामले से alert हटा देने देती है। Alert तब बनती है जब कोई खास जानकारी बदली जाती है, जैसे नोट्स अपडेट करने पर। आमतौर पर alert मामले के पास पीले रंग के डॉट के रूप में दिखाई देती है।"
            label: किसी घटना से अलर्ट हटाएँ
          manage:
            explanation: यह अनुमति उपयोगकर्ता को मामलों पर सभी उपलब्ध कार्य करने देती है। संभालना का मतलब लगभग "सब कुछ करने की अनुमति" है।
            label: प्रबंध करना (इस संसाधन प्रकार के सभी अधिकार)
          read:
            explanation: किसी केस को देखने की अनुमति
            label: देखना
          receive_referral:
            explanation: "किसी उपयोगकर्ता को रेफ़रल प्राप्त करने की अनुमति देता है। जिन उपयोगकर्ताओं के पास यह अनुमति है, वे रेफ़रल कार्रवाई के संभावित लेने वाले के रूप में दिखाई देंगे, जबकि जिन उपयोगकर्ताओं के पास यह अनुमति नहीं है, वे रेफ़रल मोडल में लेने वाले खोजते समय संभावित लेने वाले में दिखाई नहीं देंगे।"
            label: "रेफ़रल प्राप्त "
          receive_referral_different_module:
            explanation: "यह उपयोगकर्ता को किसी रिकॉर्ड का रेफ़रल प्राप्त करने की अनुमति देता है, जो किसी अन्य Primero मॉड्यूल में बनाया गया हो। जिनके पास यह अनुमति है, वे उस रिकॉर्ड के रेफ़रल के संभावित लेने वाले के रूप में दिखेंगे। जिनके पास यह अनुमति नहीं है, वे रेफ़रल मोडल में लेने वाले खोजते समय सूची में नहीं दिखेंगे।"
            label: किसी अन्य मॉड्यूल के उपयोगकर्ता से रेफ़रल प्राप्त करें
          receive_transfer:
            explanation: "यह उपयोगकर्ता को ट्रांसफ़र प्राप्त करने की अनुमति देता है। जिनके पास यह अनुमति है, वे ट्रांसफ़र के संभावित लेने वाले के रूप में दिखेंगे। जिनके पास यह अनुमति नहीं है, वे ट्रांसफ़र मोडल में लेने वाले खोजते समय सूची में नहीं दिखेंगे।"
            label: ट्रांसफ़र लेना
          referral:
            explanation: "यह उपयोगकर्ता को किसी केस का अस्थायी एक्सेस किसी अन्य उपयोगकर्ता को देने की अनुमति देता है। रेफ़रल पाने वाला उपयोगकर्ता उस केस पर वही सभी कार्य कर सकेगा जो वह अपने खुद के केस पर कर सकता है। जब उसे केस का एक्सेस अब नहीं चाहिए, तो वह रेफ़रल और ट्रांसफ़र सबफ़ॉर्म में \"Done\" बटन क्लिक करके एक्सेस खो सकता है। आप केवल ऐसे उपयोगकर्ता को केस रेफ़र कर सकते हैं, जिनकी भूमिका को रेफ़रल प्राप्त करने की अनुमति है।"
            label: रेफ़रल
          referral_from_service:
            explanation: "यह उपयोगकर्ता को सेवाएँ सबफ़ॉर्म में रेफ़र / भेजें बटन दिखने की अनुमति देता है। जब उपयोगकर्ता इस बटन पर क्लिक करता है, तो रेफ़रल मोडल खुलेगा, जिसमें सेवा का प्रकार, एजेंसी/संस्था, सेवा प्रदाता और स्थान के फील्ड्स निष्क्रिय होंगे, लेकिन अपने आप उसी सेवाएँ सबफ़ॉर्म की जानकारी से भर जाएंगे, जिस पर उपयोगकर्ता ने रेफ़र / भेजें बटन क्लिक किया था।"
            label: सेवा उपफ़ॉर्म से केस रेफ़र करें
          remove_assigned_users:
            explanation: "यह उपयोगकर्ता को \"अन्य असाइन किए गए उपयोगकर्ता\" फ़ील्ड से अन्य उपयोगकर्ताओं को हटाने की अनुमति देता है। कोई उपयोगकर्ता यहाँ तब सूचीबद्ध होता है जब उसने केस के लिए रेफ़रल प्राप्त किया हो या केस के लिए ट्रांसफ़र प्राप्त किया हो, लेकिन उसने इसे अभी स्वीकार या अस्वीकार नहीं किया है। जब आप \"अन्य असाइन किए गए उपयोगकर्ता\" फ़ील्ड से किसी उपयोगकर्ता को हटाते हैं, तो आप उसका केस तक पहुँच का अधिकार हटा देते हैं। इसलिए, जिन उपयोगकर्ताओं के पास यह अनुमति है, वे उन उपयोगकर्ताओं का केस एक्सेस हटा सकते हैं जिन्होंने पहले रेफ़रल प्राप्त किया हो या जिनके पास अभी पेंडिंग ट्रांसफ़र हो। ध्यान दें कि यह अनुमति केवल तभी काम करती है जब वर्तमान उपयोगकर्ता को भी केस को संपादित करने की क्षमता हो।"
            label: अन्य असाइन किए गए उपयोगकर्ताओं को हटाएं (रेफ़र किए गए उपयोगकर्ताओं से केस एक्सेस वापस लें)
          reopen:
            explanation: यह उपयोगकर्ता को उस केस को खोलने की अनुमति देता है जो वर्तमान में बंद है।
            label: पुनः खोलें
          request_approval_action_plan:
            explanation: "केस वर्कर अपने प्रबंधक से अपने केस के %{approval_label} को मंज़ूरी देने के लिए अनुरोध कर सकता है।"
            label: "%{approval_label}की स्वीकृति का अनुरोध करें"
          request_approval_assessment:
            explanation: "यह उपयोगकर्ता (अक्सर केस वर्कर) को अपने प्रबंधक से अपने केस के %{approval_label} को मंज़ूर करने का अनुरोध करने की अनुमति देता है।"
            label: "%{approval_label} को मंज़ूरी देने के लिए पूछें"
          request_approval_bia:
            explanation: "यह उपयोगकर्ता (अक्सर केस वर्कर) को अपने प्रबंधक से अपने केस के %{approval_label} को मंज़ूरी देने के लिए कहने की अनुमति देता है।"
            label: "%{approval_label} मंज़ूरी के लिए कहें"
          request_approval_case_plan:
            explanation: "यह उपयोगकर्ता (अक्सर केस वर्कर) को अपने प्रबंधक से अपने केस के %{approval_label}को मंज़ूरी देने के लिए कहने की अनुमति देता है।"
            label: "%{approval_label}मंज़ूरी के लिए कहें"
          request_approval_closure:
            explanation: "यह उपयोगकर्ता (अक्सर केस वर्कर) को अपने प्रबंधक से अपने केस के %{approval_label} को मंज़ूरी देने के लिए कहने की अनुमति देता है।"
            label: "%{approval_label}की मंज़ूरी माँगें"
          request_approval_gbv_closure:
            explanation: "यह उपयोगकर्ता (अक्सर केस वर्कर) को अपने प्रबंधक से अपने केस के %{approval_label} को मंज़ूरी देने के लिए कहने की अनुमति देता है।"
            label: "%{approval_label}की मंज़ूरी माँगें"
          request_transfer:
            explanation: "\"व्यू मोडल\" में \"ट्रांसफ़र का अनुरोध\" बटन दिखाता है। यह बटन उपयोगकर्ता को ईमेल के माध्यम से एक व्यक्तिगत नोट के साथ संदेश भेजने की अनुमति देता है, जिसमें वर्तमान रिकॉर्ड के मालिक से अनुरोध किया जाता है कि वह केस को उस उपयोगकर्ता को ट्रांसफ़र करें जिसने अनुरोध भेजा है। यह उन परिस्थितियों में उपयोगी है जहाँ बच्चे अक्सर स्थान बदलते हैं, और केस वर्कर्स को बच्चे की पिछली जानकारी प्राप्त करने की आवश्यकता होती है ताकि डुप्लिकेट रिकॉर्ड बनने से बचा जा सके।"
            label: ट्रांसफ़र का अनुरोध
          search_owned_by_others:
            explanation: "यह उपयोगकर्ता को उन रिकॉर्ड्स के लिए खोज करने की अनुमति देता है जिन तक उन्हें सामान्यतः एक्सेस नहीं होता, चाहे इसका कारण यह हो कि वे उस केस के रिकॉर्ड मालिक नहीं हैं, या (मैनेजर्स के लिए) कि रिकॉर्ड मालिक उनके यूज़र ग्रुप में नहीं है। ध्यान दें कि उपयोगकर्ता खोज परिणामों में केस देख पाएंगे, लेकिन केस शो पेज पर क्लिक नहीं कर पाएंगे, यानी वे केस की कोई विस्तृत जानकारी नहीं देख पाएंगे।"
            label: अन्य उपयोगकर्ताओं के केस के मालिक वाले रिकॉर्ड खोजें
          service_provision_incident_details:
            explanation: "यह उपयोगकर्ता को घटना जोड़ें मोडल के नीचे \"सहेजें और सेवा प्रावधान जोड़ें\" बटन दिखने की अनुमति देता है। इस बटन पर क्लिक करने से वर्तमान में दर्ज की गई घटना की जानकारी सहेज ली जाती है, और उपयोगकर्ता सीधे सेवा प्रावधान जोड़ें मोडल पर ले जाया जाता है। क्योंकि यह क्रिया सीधे घटना जोड़ें और सेवा प्रावधान जोड़ें क्रियाओं से जुड़ी है, इसलिए यह अनुमति केवल उस भूमिका को देना सही होगा, जिसके पास \"किसी अन्य उपयोगकर्ता के केस में घटना विवरण जोड़ें\" और \"किसी अन्य उपयोगकर्ता के केस में सेवा प्रावधान जोड़ें\" अनुमतियाँ भी हों।"
            label: घटना विवरण में सेवा जोड़ें बटन देखें
          services_section_from_case:
            explanation: "उपयोगकर्ता को उस केस पर सेवाएँ उपफ़ॉर्म में एक प्रविष्टि जोड़ने की क्षमता देता है, जो उसने खोज परिणामों में पाया है, लेकिन जिस पर उसका एक्सेस नहीं है। उपयोगकर्ता यह क्रिया खोज परिणाम पृष्ठ से करता है, एक या अधिक केस चुनकर और फिर क्रियाएँ मेनू से \"सेवा प्रावधान जोड़ें\" चुनकर। इसके बाद उपयोगकर्ता एक मोडल देखता है जिसमें सेवाएँ उपफ़ॉर्म के सभी फ़ील्ड्स होते हैं, जहाँ वह सेवा की जानकारी दर्ज और सबमिट कर सकता है। क्योंकि यह क्रिया केवल खोज परिणाम पृष्ठ से की जा सकती है, इसलिए यह अनुमति केवल उस भूमिका को दी जानी चाहिए जिसके पास \"अन्य उपयोगकर्ताओं के केस रिकॉर्ड खोजें\" अनुमति भी हो।"
            label: किसी अन्य उपयोगकर्ता के केस में सेवा जोड़ें
          service_own_entries_only:
            explanation: "इस अनुमति वाले उपयोगकर्ता, जब किसी ऐसे केस को खोलते हैं जो उन्हें रेफ़र किया गया है, केवल उन सेवा रिकॉर्ड्स को देख पाएंगे जिनमें उन्हें सेवा देने वाला के रूप में चुना गया है। यह आम तौर पर सेवा देने वाले की भूमिका के लिए उपयोग किया जाता है।"
            label: केवल अपने सेवाएँ फॉर्म रिकॉर्ड्स तक पहुँचें
          sync_external:
            explanation: किसी रिकॉर्ड को बाहरी सिस्टम के साथ संपर्क/सिंक करने की सुविधा
            label: किसी रिकॉर्ड को बाहरी सिस्टम के साथ सिंक करें
          sync_mobile:
            explanation: यह संकेतक गिनता है कि प्रत्येक रिपोर्टिंग साइट पर हर महीने कितने नए केस खोले जाते हैं। रिपोर्टिंग साइट से मतलब उस स्थान से है जहाँ उपयोगकर्ता संगठन सेवाएँ प्रदान कर रहा है और जहाँ केस को सेवा प्रदाता को रिपोर्ट किया गया था।
            label: ऑफ़लाइन के लिए चिह्नित करें
          transfer:
            explanation: "यह सुविधा उपयोगकर्ता को किसी केस को उसके वर्तमान रिकॉर्ड मालिक से किसी अन्य उपयोगकर्ता को भेजने की अनुमति देती है, जो ट्रांसफर स्वीकार करने की क्षमता रखता है। केस का रिकॉर्ड मालिक तब तक नहीं बदलता जब तक कि ट्रांसफर पाने वाला इसे \"स्वीकार\" नहीं करता। यदि पाने वाला ट्रांसफर को \"अस्वीकार\" करता है, तो उसे केस तक पहुँच नहीं रहती और केस का मूल रिकॉर्ड मालिक जस का तस रहता है।"
            label: ट्रांसफर
          view_photo:
            explanation: "यह सुविधा उपयोगकर्ता को केस सूची में केस की फ़ोटो देखने की अनुमति देती है। यदि यह अनुमति नहीं है, तो उपयोगकर्ता केस सूची में \"फोटो\" कॉलम या वहाँ दिखने वाले फोटो आइकन नहीं देख पाएगा। यह अनुमति उपयोगकर्ता को \"व्यू मोडल\" में बच्चे की फ़ोटो देखने की भी सुविधा देती है।"
            label: केस लिस्ट में फ़ोटो देखें
          view_incident_from_case:
            explanation: "जब कोई उपयोगकर्ता एक केस देखता है, तो वह उस केस से जुड़े घटनाओं (Incidents) की सूची देख सकता है, साथ ही प्रत्येक घटना की कुछ संक्षिप्त जानकारी भी देख सकता है।"
            label: केस से घटनाएँ देखें
          view_protection_concerns_filter:
            explanation: यह उपयोगकर्ता को केस लिस्ट पेज पर सुरक्षा चिंता फ़िल्टर दिखाती है।
            label: केस लिस्ट पेज पर सुरक्षा फ़िल्टर देखें
          view_registry_record:
            explanation: "यह सुविधा उपयोगकर्ता को किसी भी केस से जुड़े रजिस्ट्री की जानकारी देखने की अनुमति देती है। साथ ही, यह उपयोगकर्ता को केस में रजिस्ट्री जानकारी फ़ॉर्म देखने की सुविधा भी देती है।"
            label: केस से रजिस्ट्री रिकॉर्ड देखें
          write:
            explanation: "\"एडिट\" बटन क्लिक करने, केस की जानकारी बदलने और \"सेव\" बटन क्लिक करने की क्षमता"
            label: बदलें
          accept_or_reject_transfer:
            explanation: "यह सुविधा उपयोगकर्ता को अपनी टीम के किसी अन्य उपयोगकर्ता की ओर से ट्रांसफर को स्वीकार या अस्वीकार करने की अनुमति देती है (उदाहरण के लिए, एक सुपरवाइजर उस ट्रांसफर को स्वीकार कर सकता है जो उनके सोशल वर्कर को भेजा गया है)।"
            label: अपनी टीम के किसी अन्य उपयोगकर्ता के लिए ट्रांसफर स्वीकार या अस्वीकार करें
          list_case_names:
            explanation: "मैनेजर केस लिस्ट में केस के नाम नहीं देख पाते। यदि प्रबंधक के पास यह अनुमति है, तो वे लिस्ट में केस के नाम देख सकेंगे।"
            label: "यदि मैनेजर हो, तो केस लिस्ट में केस के नाम देख सकते हैं"
          mark_for_offline:
            explanation: यह सुविधा उपयोगकर्ता को केस को ऑफ़लाइन इस्तेमाल के लिए सेव करने की अनुमति देती है।
            label: ऑफ़लाइन के लिए चिह्नित करें
          view_family_record:
            explanation: "उपयोगकर्ता केस में 'परिवार रिकॉर्ड' फॉर्म देख सकते हैं, जिसमें उस केस के परिवार रिकॉर्ड का लिंक शामिल होता है।"
            label:  केस से परिवार रिकॉर्ड देखें
          case_from_family:
            explanation: उपयोगकर्ता फ़ैमिली डिटेल्स सबफॉर्म में किसी केस के परिवार के सदस्य के लिए नया केस बना सकते हैं। ध्यान दें कि इन दोनों केसों को जोड़ने के लिए एक परिवार रिकॉर्ड अपने आप बनाया जाएगा।
            label: परिवार जानकारी से केस बनाएं
          link_family_record:
            explanation: "यह सुविधा उपयोगकर्ता को किसी मौजूदा परिवार रिकॉर्ड को अपने केस से खोजकर जोड़ने की अनुमति देती है। साथ ही, यह उपयोगकर्ता को किसी परिवार रिकॉर्ड को केस से अलग करने की भी सुविधा देती है।"
            label: केस से परिवार रिकॉर्ड जोड़ें / हटाएं
          view_case_relationships:
            explanation: यह सुविधा उपयोगकर्ता को वर्तमान केस से जुड़े सभी केसों की सूची देखने की अनुमति देती है।
            label: जुड़े हुए केस देखें
          update_case_relationships:
            explanation: "यह सुविधा उपयोगकर्ता को अपने केस को अपडेट करते समय किसी अन्य मौजूदा केस को खोजकर अपने केस से जोड़ने की अनुमति देती है। साथ ही, यह सुविधा उपयोगकर्ता को इस दूसरे केस को अपने केस से अलग करने की भी अनुमति देती है।"
            label: केस को दूसरे केस से जोड़ें / अलग करें
          attribute:
            explanation: "उस उपयोगकर्ता को चुनें जिसने केस की पहचान की। कुछ सिस्टम में यह केवल वह उपयोगकर्ता हो सकता है जिसने व्यक्ति/सदस्य के केस मैनेजमेंट की शुरुआत की। ऐसे सिस्टम में जहां स्वयं-पंजीकरण की अनुमति है, यह उपयोगकर्ता स्वयं व्यक्ति/सदस्य भी हो सकता है।"
            label: गुण / विशेषता
        explanation: "यह किसी एक बच्चे, बचे हुए व्यक्ति, या अन्य सदस्य को दिखाता है।"
        label: केस
      dashboard:
        actions:
          action_needed_new_updated:
            explanation: "'Action Needed' डैशबोर्ड में 'नए और अपडेटेड' संकेतक दिखाता है। इसमें ऐसे केस शामिल हैं जो वर्तमान उपयोगकर्ता को नए तौर पर असाइन किए गए हैं, या जिन्हें किसी अन्य उपयोगकर्ता ने उस समय के बाद अपडेट किया है जब वर्तमान उपयोगकर्ता ने इसे आखिरी बार अपडेट किया था।"
            label: 'कार्रवाई आवश्यक: नया या अपडेट किया गया'
          action_needed_identified:
            explanation: "यह उन केसों की संख्या दिखाता है जिन्हें पहचाना गया है, लेकिन अभी तक खोला नहीं गया है और जिनका केस प्रबंधन शुरू नहीं हुआ है।"
            label: 'कार्रवाई आवश्यक: पहचाने गए केस'
          action_needed_new_referrals:
            explanation: "'Action Needed' डैशबोर्ड में 'नए रेफरल' संकेतक दिखाता है। इसमें ऐसे केस शामिल हैं जिनके नए रेफरल वर्तमान उपयोगकर्ता को भेजे गए हैं, और वर्तमान उपयोगकर्ता ने उस केस को आखिरी बार अपडेट नहीं किया है।"
            label: 'कार्रवाई आवश्यक: नए रेफरल'
          action_needed_transfer_awaiting_acceptance:
            explanation: "'Action Needed' डैशबोर्ड में 'स्वीकृति की प्रतीक्षा में ट्रांसफर' संकेतक दिखाता है। इसमें वे केस शामिल हैं जिनका ट्रांसफर वर्तमान उपयोगकर्ता को किया गया है और जिसे वर्तमान उपयोगकर्ता ने अभी तक स्वीकार नहीं किया है।"
            label: 'कार्रवाई आवश्यक: स्वीकृति की प्रतीक्षा में ट्रांसफर'
          approvals_action_plan:
            explanation: "यह वर्तमान उपयोगकर्ता के उन केसों की संख्या दिखाता है जिनमें एक्शन प्लान की मंजूरी के अनुरोध, मंजूर या अस्वीकार किए गए हैं।"
            label: "%{approval_label}केस वर्कर की मंजूरी"
          approvals_action_plan_pending:
            explanation: यह दिखाता है कि प्रबंधक की टीम में कितने केसों के एक्शन प्लान अनुरोध बाकी हैं।
            label: "प्रबंधक के %{approval_label}मंजूरी"
          approvals_assessment:
            explanation: "यह वर्तमान उपयोगकर्ता के उन केसों की संख्या दिखाता है जिनमें मूल्यांकन (Assessment) मंजूरी के अनुरोध बाकी, मंजूर या अस्वीकार किए गए हैं।"
            label: "केस वर्कर के %{approval_label}मंजूरी"
          approvals_assessment_pending:
            explanation: यह दिखाता है कि प्रबंधक की टीम में कितने केसों के मूल्यांकन (Assessment) मंजूरी अनुरोध बाकी हैं।
            label: "मैनेजर के %{approval_label}मंजूरी"
          approvals_case_plan:
            explanation: "यह दिखाता है कि वर्तमान उपयोगकर्ता के कितने केसों के केस प्लान मंजूरी अनुरोध पूरे नहीं हुए, मंजूर या अस्वीकार किए गए हैं।"
            label: "केस वर्कर के %{approval_label} मंजूरी"
          approvals_case_plan_pending:
            explanation: यह दिखाता है कि प्रबंधक की टीम में कितने केसों के केस प्लान मंजूरी अनुरोध पूरे नहीं हुए हैं
            label: "मैनेजर के %{approval_label} मंजूरी"
          approvals_closure:
            explanation: "यह दिखाता है कि वर्तमान उपयोगकर्ता के कितने केसों के क्लोज़र (Closure) मंजूरी अनुरोध पूरे नहीं हुए, मंजूर या अस्वीकार किए गए हैं।"
            label: "केस वर्कर के %{approval_label} मंजूरी"
          approvals_closure_pending:
            explanation: यह दिखाता है कि प्रबंधक की टीम में कितने केसों के क्लोज़र (Closure) मंजूरी अनुरोध पूरे नहीं हुए हैं।
            label: "मैनेजर के %{approval_label} मंजूरी"
          approvals_gbv_closure:
            explanation: "यह दिखाता है कि वर्तमान उपयोगकर्ता के कितने केसों के GBV क्लोज़र मंजूरी अनुरोध पूरे नहीं हुए, मंजूर या अस्वीकार किए गए हैं।"
            label: "केस वर्कर के %{approval_label}मंजूरी"
          approvals_gbv_closure_pending:
            explanation: यह दिखाता है कि प्रबंधक की टीम में कितने केसों के GBV क्लोज़र मंजूरी अनुरोध पूरे नहीं हुए हैं।
            label: "मैनेजर के %{approval_label} मंजूरी"
          case_overview:
            explanation: "होम पेज के ऊपर का ओवरव्यू डैशबोर्ड कार्ड, जिसमें कुल और नए मामलों जैसी संख्याएँ दिखाई जाती हैं।"
            label: ओवरव्यू डैशबोर्ड
          case_risk:
            explanation: "दिखाता है कि हर जोखिम स्तर पर कितने मामले हैं।\n \n \n "
            label: "जोखिम स्तर के अनुसार मामले\n \n \n "
          cases_by_task_overdue_assessment:
            explanation: यह मैनेजर को दिखाता है कि उनके प्रत्येक केस वर्कर के कितने मामलों में असाइनमेंट किए गए मूल्यांकन कार्य देरी से पूरे हुए हैं।
            label: समय सीमा पार किए गए जाँच कार्य
          cases_by_task_overdue_case_plan:
            explanation: यह मैनेजर को दिखाता है कि उनके प्रत्येक केस वर्कर के कितने मामलों में केस प्लान के कार्य समय से पूरे नहीं हुए हैं।
            label: समय सीमा पार किए गए केस प्लान कार्य
          cases_by_task_overdue_followups:
            explanation: "यह मैनेजर को दिखाता है कि उनके प्रत्येक केस वर्कर के कितने मामलों में फॉलो-अप कार्य समय से पूरे नहीं हुए हैं।\n \n \n "
            label: समय सीमा पार किए गए फॉलो-अप कार्य
          cases_by_task_overdue_services:
            explanation: यह मैनेजर को दिखाता है कि उनके प्रत्येक केस वर्कर के कितने मामलों में सर्विस कार्य समय से पूरे नहीं हुए हैं।
            label: समय सीमा पार किए गए सेवा कार्य
          dash_case_incident_overview:
            explanation: यह मैनेजर को दिखाता है कि उनकी टीम के प्रत्येक यूज़र द्वारा प्रबंधित कितने मामले अन्य यूज़र्स को रेफ़र या ट्रांसफर किए जा रहे हैं।
            label: ओवरव्यू - मेरे मामले / घटनाएँ
          dash_cases_by_social_worker:
            explanation: "यह तालिका दिखाती है कि वर्तमान उपयोगकर्ता के उपयोगकर्ता समूह में प्रत्येक यूज़र द्वारा कितने खुले मामले और नए मामले प्रबंधित किए गए हैं। प्रत्येक पंक्ति वर्तमान उपयोगकर्ता के समूह में एक यूज़र को दर्शाती है, जबकि \"कुल\" और \"नए\" दो कॉलम हैं।"
            label: "सामाजिक कार्यकर्ता के अनुसार मामले देखें\n \n \n "
          dash_cases_to_assign:
            explanation: 'महत्वपूर्ण: केवल मैनेजर के लिए। यह दिखाता है कि वर्तमान उपयोगकर्ता (जो मैनेजर होना चाहिए) द्वारा सीधे कितने मामले हैं। यह डैशबोर्ड मानता है कि मैनेजर अपने खुद के मामलों का प्रबंधन नहीं करते हैं, और यदि किसी मैनेजर के अपने मामले हैं, तो उन्हें इन्हें अपनी टीम के केस वर्कर्स को असाइन करना चाहिए।'
            label: "(मैनेजर के लिए) वे मामले जिन्हें मुझे अपनी टीम के लोगों को असाइन करना है\n \n \n "
          dash_flags:
            explanation: "यह दिखाता है कि अन्य यूज़र्स ने मेरे रिकॉर्ड में कौन-कौन से फ़्लैग जोड़े हैं, और मैंने अन्य यूज़र्स के रिकॉर्ड में कौन-कौन से फ़्लैग जोड़े हैं।"
            label: फ़्लैग किए गए रिकॉर्ड
          dash_group_overview:
            explanation: यह मैनेजर को दिखाता है कि उनकी टीम के यूज़र्स द्वारा कितने खुले और बंद केस प्रबंधित किए गए हैं।
            label: "मेरी टीम के केस\n \n \n "
          dash_matching_results:
            explanation: "बंद किया गया। यह डैशबोर्ड काम नहीं कर रहा है और इसे v2 में हटा दिया जाएगा।\n \n \n "
            label: "मिलान परिणाम देखें\n \n \n "
          dash_protection_concerns:
            explanation: "यह तालिका दिखाती है कि प्रत्येक सुरक्षा चिंता (Protection Concern) के कितने केस हैं। तालिका की हर पंक्ति एक सुरक्षा चिंता को दर्शाती है, और कॉलम केसों की विभिन्न स्थितियों को दिखाते हैं (\"सभी केस,\" \"खुले केस,\" \"नए (इस सप्ताह),\" \"बंद किए गए (इस सप्ताह)\")."
            label: सुरक्षा चिंताओं के अनुसार केस
          dash_protection_concerns_by_location:
            explanation: "यह \"सुरक्षा चिंताओं देखें\" (View Protection Concerns) डैशबोर्ड के जैसा ही है, लेकिन उपयोगकर्ता ड्रॉपडाउन से किसी स्थान को चुन सकता है और केवल उस स्थान में सुरक्षा चिंताओं की स्थिति दिखा सकता है।"
            label: स्थान के अनुसार सुरक्षा चिंताओं को देखें
          dash_reporting_location:
            explanation: "यह तालिका दिखाती है कि हर स्थान (जैसे इलाका या जिला) में कितने केस हैं। तालिका की हर पंक्ति एक स्थान को दिखाती है, और कॉलम केस की विभिन्न स्थितियों को दर्शाते हैं (\"खुले केस,\" \"नए (पिछले सप्ताह),\" \"नए (इस सप्ताह),\" \"बंद किए गए (पिछले सप्ताह),\" \"बंद किए गए (इस सप्ताह)\"). आमतौर पर यह प्रबंधक या खातों के लिए उपयोग किया जाता है।"
            label: रिपोर्टिंग स्थान के अनुसार केस
          dash_service_provisions:
            explanation: यह दिखाता है कि कितने केसों में अन्य उपयोगकर्ताओं ने कोई सेवा जोड़ी है। यह संख्या डैशबोर्ड के मुख्य हिस्से में दिखाई देती है।
            label: सपोर्ट के प्रकार के अनुसार केस
          dash_shared_from_my_team:
            explanation: "ह प्रबंधक को दिखाता है कि उनकी टीम के प्रत्येक उपयोगकर्ता द्वारा कितने केस प्रबंधित किए जा रहे हैं, जिन्हें अन्य उपयोगकर्ताओं को रेफर या ट्रांसफर किया जा रहा है।"
            label: मेरी टीम से साझा किए गए
          dash_shared_with_me:
            explanation: यह दिखाता है कि कितने केस आपको रेफर या ट्रांसफर किए गए हैं।
            label: मेरे साथ साझा किए गए
          dash_shared_with_my_team:
            explanation: यह प्रबंधक को दिखाता है कि उनकी टीम के प्रत्येक उपयोगकर्ता को कितने केस रेफर या ट्रांसफर किए गए हैं।
            label: मेरी टीम के साथ साझा किए गए
          dash_shared_with_my_team_overview:
            explanation: यह प्रबंधक को दिखाता है कि उनकी टीम के हर उपयोगकर्ता को कितने केस रेफर या ट्रांसफर किए गए हैं।
            label: मेरी टीम के साथ साझा किया गया (सारांश)
          dash_shared_with_others:
            explanation: "यह दिखाता है कि मेरे कितने केसों में सक्रिय रेफरल हैं, लंबित ट्रांसफर हैं, या ट्रांसफर अस्वीकार किए गए हैं। आम तौर पर यह प्रबंधकों के लिए नहीं होता, सिवाय इसके कि वे खुद केस प्रबंधित करते हों।"
            label: दूसरों के साथ साझा किए गए
          dash_violations_category_verification_status:
            explanation: "यह दिखाता है कि प्रत्येक प्रकार के MRM उल्लंघन कितने हुए हैं, और उनकी सत्यापन (Verification) स्थिति क्या है।"
            label: MRM - प्रत्येक सत्यापन स्थिति के अनुसार उल्लंघनों की संख्या
          dash_violations_category_region:
            explanation: "यह दिखाता है कि प्रत्येक क्षेत्र में कितने MRM उल्लंघन हुए हैं, और उन्हें उल्लंघन के प्रकार के अनुसार दिखाया गया है।"
            label: MRM - प्रत्येक क्षेत्र के अनुसार उल्लंघनों की संख्या
          dash_perpetrator_armed_force_group_party_names:
            explanation: यह दिखाता है कि प्रत्येक प्रकार के MRM उल्लंघन कितने हुए हैं और उन्हें अपराधी (Perpetrator) के अनुसार दिखाया गया है।
            label: MRM - प्रत्येक अपराधी के अनुसार उल्लंघनों की संख्या
          dash_show_none_values:
            explanation: "यह सभी डैशबोर्ड में एक अतिरिक्त \"कोई जोखिम स्तर नहीं\" (No Risk Level) श्रेणी जोड़ता है, जो केसों को जोखिम स्तर के अनुसार दिखाते हैं। यह खास तौर पर उन सेटिंग्स के लिए है जिनमें जोखिम स्तर फ़ील्ड के लिए चौथा विकल्प \"कोई जोखिम नहीं\" मौजूद होता है।"
            label: असेसमेंट डैशबोर्ड में 'कोई जोखिम स्तर नहीं' वाले केस देखें
          dash_tasks:
            explanation: "यह उपयोगकर्ता को टास्क पेज देखने की अनुमति देता है। इसका उपयोग केस वर्करों और सेवा प्रदाताओं के लिए किया जाना चाहिए, क्योंकि यह संख्या सीधे आपके द्वारा प्रबंधित केसों के लिए होगी। प्रबंधकों को इसके बजाय \"लंबित टास्क के अनुसार केस देखें\" डैशबोर्ड प्राप्त करना चाहिए, क्योंकि इससे वे अपनी टीम के सभी उपयोगकर्ताओं के लंबित टास्क देख सकते हैं"
            label: टास्क पेज
          dash_national_admin_summary:
            explanation: "यह सिस्टम में कुल खुले केस दिखाता है, पिछले दो हफ्तों में बनाए गए नए केसों की संख्या, और पिछले दो हफ्तों में बंद किए गए केसों की संख्या।"
            label: "यह सिस्टम में कुल खुले केस दिखाता है, पिछले दो हफ्तों में बनाए गए नए केसों की संख्या, और पिछले दो हफ्तों में बंद किए गए केसों की संख्या।"
          view_response:
            explanation: "प्रत्येक प्रतिक्रिया प्रकार के लिए, यह दिखाता है कि कितने केसों में हर जोखिम स्तर पर सेवाएँ हैं जो पूरा होने की आखिरी तारीख के करीब हैं या समय पर पूरी नहीं हुई हैं।"
            label: प्रतिक्रियाएँ देखें
          workflow:
            explanation: "यह केस वर्कर को एक पाई ग्राफ दिखाने की अनुमति देता है, जिसमें उनके केसों की केस प्रबंधन प्रक्रिया के प्रत्येक चरण में स्थिति दिखाई जाती है।"
            label: वर्कफ़्लो के अनुसार विभाजित केस
          workflow_team:
            explanation: "यह प्रबंधक को एक तालिका दिखाने की अनुमति देता है, जिसमें यह बताया गया है कि उनके सामाजिक कार्यकर्ताओं के कितने केस केस प्रबंधन प्रक्रिया के प्रत्येक चरण में हैं।"
            label: वर्कफ़्लो और केस वर्कर के अनुसार केस
        explanation: यह तय करता है कि होम पेज पर कौन सी सारांश जानकारी दिखाई जाएगी।
        label: डैशबोर्ड
      disabled:
        explanation: "यदि आप इस भूमिका को अक्षम कर देते हैं, तो आप इसे उपयोगकर्ता खातों को असाइन नहीं कर पाएंगे।"
        label: बंद
      referral_authorization:
        explanation: "इसका मतलब है कि जब उपयोगकर्ता अंदरूनी रेफरल करता है, तो यह भूमिका \"Type of Referral\" ड्रॉपडाउन में एक विकल्प के रूप में दिखेगी। अगर उपयोगकर्ता इस भूमिका को रेफरल के प्रकार के रूप में चुनता है, तो रेफरल प्राप्तकर्ता केवल वही फॉर्म देख पाएगा जिन तक इस भूमिका की पहुँच है।"
        label: "क्या इस रोल का उपयोग \"रेफरल का प्रकार\" ड्रॉपडाउन के लिए किया जा सकता है?"
      duplicate:
        actions:
          read:
            explanation: "यह उपयोगकर्ता को सिस्टम में सभी केस खोजने की सुविधा देता है। आप नाम, उपनाम, लिंग, उम्र और देश के आधार पर केस खोज सकते हैं।"
            label: देखें
        explanation: एडमिन के लिए केस खोजने का तरीका।
        label: डुप्लिकेट खोज
      forms:
        case:
          explanation: 'किसी उपयोगकर्ता की केस से संबंधित फॉर्म तक पहुंच सीमित करने से यह तय होता है कि वह घटना से जुड़ी कौन-सी जानकारी देख सकता है।


