      helptext: |
        यह संकेतक मापता है कि कैसो को कितने समय तक खुला रखा जाता है और प्रारंभिक रिपोर्ट से लेकर केस बंद होने तक केस प्रबंधन प्रक्रिया में कितना समय लगता है।

        समय अवधि को निम्न वर्गों में विभाजित किया जाता है:
        1 महीने से कम; 1 से 3 महीने के बीच; 3 से 6 महीने के बीच; 6 महीने से अधिक।
    case_closure_rate:
      title: "12. केस बंद करने की संख्या"
      reporting_site: "रिपोर्ट भेजने की जगह"
      helptext: |
        यह संकेतक प्रत्येक रिपोर्टिंग साइट पर प्रति माह बंद किए गए मामलों की संख्या दर्शाता है।

        रिपोर्टिंग साइट से आशय उस स्थान से है जहाँ उपयोगकर्ता संगठन सेवाएँ प्रदान कर रहा है और जहाँ घटना सेवा प्रदाता को रिपोर्ट की गई है।
    client_satisfaction_rate:
      title: "13. client संतुष्टि का स्तर"
      label: "Client की संतुष्टि का स्तर"
      invalid: "हम इसे अभी गणना नहीं कर सकते।"
      helptext: |
        यह संकेतक उन सर्वाइवर का प्रतिशत दर्शाता है जिन्होंने क्लाइंट फीडबैक सर्वे पूरा किया और जो उन्हें प्रदान की गई केस प्रबंधन सेवाओं से संतुष्ट हैं।

        यह संकेतक GBVIMS+ में क्लाइंट फीडबैक फॉर्म के पूरा होने पर आधारित होता है, जिसे उस स्टाफ सदस्य द्वारा भरा जाता है जो सर्वाइवर को सेवा देने वाला केसवर्कर नहीं होता है।
    supervisor_to_caseworker_ratio:
      title: "14. सुपरवाइज़र और केसवर्कर का अनुपात"
      label: "प्रत्येक सुपरवाइज़र पर केसवर्कर की संख्या"
      helptext: |
        यह संकेतक दर्शाता है कि एक पर्यवेक्षक (सुपरवाइज़र) कितने केसवर्करों की निगरानी कर रहा है, अर्थात सुपरवाइज़र से केसवर्कर का अनुपात।

        यह गणना प्लेटफ़ॉर्म पर निर्धारित सिस्टम भूमिकाओं के आधार पर की जाती है।
    case_load:
      title: "15. केस लोड"
      case_load: "केस लोड"
      percent: "केस वर्कर जिनके पास केस लोड है, उनका प्रतिशत"
      10cases: "10 से कम मामले"
      20cases: "11 - 20 मामले"
      21-30cases: "21 से 30 केस"
      30cases: "30 से अधिक केस"
      helptext: |
        यह संकेतक सक्रिय कैसो के आधार पर प्रत्येक सक्रिय (एनेबल्ड) केसवर्कर के लिए औसत केस लोड दर्शाता है।

        केसों और केसवर्करों का अनुपात निम्न श्रेणियों में विभाजित किया जाता है:
        10 से कम खुले केस; 10–20 खुले केस; 21–30 खुले केस; 30 से अधिक खुले केस।
    date_range_dialog:
      title: "कस्टम तिथि सीमा"
      description: "एक बार यह परिवर्तन लागू हो जाने पर, डेटा नीचे दी गई दो तारीख़ों के बीच से चुना जाएगा।"
      apply: 'लागू करें'
      from: 'से'
      to: 'तक'
      aria-labels:
        from: "डेटा इस तारीख़ के बाद से चुना जाएगा"
        to: "डेटा इस तारीख़ से पहले चुना जाएगा"

