          workflow_report:
            label: वर्कफ़्लो (केस और घटनाएँ)
            explanation: केस और उनसे जुड़े घटनाओं के प्रक्रिया स्थिति के आँकड़े देखने की क्षमता। इस अनुमति से उपयोगकर्ता किसी इनसाइट से डेटा भी निर्यात कर सकता है।
          cases_workflow_report:
            label: वर्कफ़्लो (केस)
            explanation: केस की प्रक्रिया स्थिति के आँकड़े देखने की क्षमता। इस अनुमति से उपयोगकर्ता किसी इनसाइट से डेटा भी निर्यात कर सकता है।
          violence_type_report:
            label: हिंसा का प्रकार (केस और घटनाएँ)
            explanation: हिंसा के प्रकार के आँकड़े देखने की क्षमता। इस अनुमति से उपयोगकर्ता किसी इनसाइट से डेटा भी निर्यात कर सकता है।
          referrals_transfers_report:
            label: रेफरल और ट्रांसफर (केस)
