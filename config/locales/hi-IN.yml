      total_incidents: "कुल घटनाएँ"
      helptext: |
        यह संकेतक उन दिनों की संख्या को गिनता और वर्गीकृत करता है जो उस समय के बीच बीते हैं जब सर्वाइवर ने GBV का अनुभव किया और जब उन्होंने पहली बार इसे किसी सेवा प्रदाता को रिपोर्ट किया।
        यह गणना उस समय के आधार पर की जाती है जब घटना पहली बार उपयोगकर्ता संगठन को रिपोर्ट की गई थी।

        डेटा को समय अवधि के अनुसार वर्गीकृत किया जाता है:
        (0-3 दिन; 4-5 दिन; 6-14 दिन; 15-30 दिन; 1 महीने से अधिक; 3 महीने से अधिक)।
