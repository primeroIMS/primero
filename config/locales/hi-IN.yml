      helptext: |
        यह संकेतक उन सक्रिय कैसो का अनुपात दर्शाता है जिनके लिए केस एक्शन प्लान पूरा किया गया है और सुपरवाइज़र द्वारा अनुमोदित किया गया है।

        केस एक्शन प्लान को तभी पूरा माना जाता है जब एक्शन प्लान फॉर्म में आवश्यक फ़ील्ड्स भरे गए हों।
        केस प्लान को तब अनुमोदित माना जाता है जब केसवर्कर प्लेटफ़ॉर्म पर केस प्लान के लिए अनुमोदन का अनुरोध करता है और पर्यवेक्षक उसे स्वीकृत करता है।
