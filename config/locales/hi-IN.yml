            label: सूची दृश्य CSV एक्सपोर्ट करें
          export_pdf:
            explanation: "उपयोगकर्ता घटना सूची या घटना विवरण पेज से PDF फ़ाइल एक्सपोर्ट कर सकता है, जिसमें उन सभी फ़ील्ड्स की जानकारी शामिल होती है जिन तक वर्तमान उपयोगकर्ता की पहुंच है। यह एक्सपोर्ट एक, कई या सभी उन रिकॉर्ड्स के लिए किया जा सकता है जिन तक उपयोगकर्ता की पहुंच है।\n\nPDF एक्सपोर्ट फ़ाइल में जानकारी पहले केस के अनुसार और फिर उस फॉर्म के अनुसार व्यवस्थित की जाती है, जिस पर वह जानकारी दर्ज होती है।"
            label: PDF एक्सपोर्ट करें
          export_xls:
            explanation: "उपयोगकर्ता घटना सूची या घटना विवरण पेज से XLS फ़ाइल एक्सपोर्ट कर सकता है, जिसमें कस्टम रूप से चुने गए फॉर्म या फ़ील्ड्स शामिल होते हैं। यह एक्सपोर्ट एक, कई या सभी उन मामलों के लिए किया जा सकता है जिन तक उपयोगकर्ता की पहुंच है।\n\nइस एक्सपोर्ट में प्रत्येक फॉर्म XLS फ़ाइल के अलग-अलग टैब में दर्शाया जाता है।\n\nउपयोगकर्ता कस्टम एक्सपोर्ट विंडो (मोडल) के माध्यम से यह चुन सकता है कि कौन-से फॉर्म या फ़ील्ड्स एक्सपोर्ट में शामिल किए जाएँ। कृपया ध्यान दें कि उपयोगकर्ता केवल उन्हीं फॉर्म और फ़ील्ड्स को एक्सपोर्ट में शामिल कर सकता है, जिन्हें वह एप्लिकेशन में केस देखते समय पहले से देख सकता है।"
            label: Excel (XLS फ़ाइल) एक्सपोर्ट
          flag:
            explanation: "किसी घटना पर फ़्लैग जोड़ने की सुविधा।\n\nइस अनुमति वाले उपयोगकर्ता उन फ़्लैग्स को हटा भी सकते हैं जो उन्होंने किसी घटना पर जोड़े हैं।\n \n "
            label: फ़्लैग
          resolve_any_flag:
            explanation: "उपयोगकर्ता को यह अनुमति देता है कि वह रिकॉर्ड पर किसी भी फ़्लैग को हल कर सके, चाहे फ़्लैग किसने भी बनाया हो।"
            label: किसी भी फ़्लैग को हल करें
          flag_update:
            explanation: "उपयोगकर्ता को यह अनुमति देता है कि वह रिकॉर्ड पर किसी भी फ़्लैग को अपडेट कर सके, चाहे फ़्लैग किसने भी बनाया हो।"
            label: फ़्लैग अपडेट करें
          import:
            explanation: "यह उपयोगकर्ता को CSV, Excel या JSON फ़ाइल से इंपोर्ट करके एक या अधिक नई घटनाएँ बनाने की अनुमति देता है।\n\nजानकारी सही तरीके से इंपोर्ट हो सके, इसके लिए इंपोर्ट की जाने वाली फ़ाइल का फ़ॉर्मेट बहुत सटीक होना चाहिए।\n\nयह सुविधा केवल उन प्रशासनिक उपयोगकर्ताओं के लिए उपलब्ध होनी चाहिए जिनके पास उन्नत तकनीकी कौशल हो और Primero में डेटा फ़ॉर्मेटिंग की गहरी समझ हो।\n\nयह क्रिया केवल घटना सूची पेज से ही की जा सकती है।"
            label: इम्पोर्ट करें
          remove_alert:
            explanation: "यह अनुमति उपयोगकर्ता को किसी घटना से अलर्ट हटाने की सुविधा देती है।\n\nअलर्ट आमतौर पर तब बनते हैं जब किसी विशेष फ़ील्ड में बदलाव किया जाता है, जैसे नोट्स अपडेट होने पर।\n\nअलर्ट आमतौर पर घटना के पास पीले बिंदु (डॉट) के रूप में दिखाई देते हैं।"
            label: किसी घटना से अलर्ट हटाएँ
          link_incident_to_case:
            explanation: उपयोगकर्ता को चयनित केस के साथ घटना को जोड़ने की अनुमति देता है।
            label: घटना को केस से जोड़ें
          manage:
            explanation: "यह उपयोगकर्ता को घटनाओं पर उपलब्ध सभी कार्रवाइयाँ करने की अनुमति देता है।\n\n\"मैनेज\" अनुमति का अर्थ मूल रूप से \"सब कुछ\" होता है।"
            label: अनुमतियाँ)
          read:
            explanation: घटना देखने की क्षमता
            label: देखें
          sync_mobile:
            explanation: "यह अनुमति सामान्य रूप से उपयोगकर्ता को मोबाइल एप्लिकेशन का उपयोग करने की अनुमति देती है। सबसे पहले, यह उपयोगकर्ता को मोबाइल के लिए मार्क करें और मोबाइल के लिए अन-मार्क करें विकल्प देखने की अनुमति देती है, जो घटना सूची और घटना विवरण पेज पर दिखाई देते हैं। किसी घटना को मोबाइल के लिए मार्क करने का मतलब है कि उस घटना की जानकारी उपयोगकर्ता के मोबाइल डिवाइस और वेब एप्लिकेशन के बीच सिंक होनी चाहिए, जबकि अन-मार्क करने से यह सिंक रुक जाता है। जिन उपयोगकर्ताओं के पास यह अनुमति नहीं है, वे अपने मोबाइल डिवाइस को वेब एप्लिकेशन के साथ सामान्य रूप से सिंक नहीं कर सकते, यानी वे मोबाइल ऐप का उपयोग करके घटनाओं को प्रबंधित नहीं कर सकते।\n "
            label: मोबाइल डिवाइस के साथ सिंक करें
          verify_mrm:
            explanation: MRM उपयोगकर्ता उल्लंघनों की स्थिति बदल सकता है।
            label: MRM सत्यापित करें
          write:
            explanation: "बदलें बटन पर क्लिक करके घटना की जानकारी अपडेट करने और सहेजें पर क्लिक करने की क्षमता। साथ ही उपयोगकर्ता घटना को सक्षम (Enable) या अक्षम (Disable) भी कर सकता है।\n "
            label: बदलें
        explanation: "Represents an event which has occurred. These are usually incidents of abuse or violence, though they can also correspond to events like encounters with law enforcement. Incidents are often linked to Cases."
        label: Incident
      is_manager:
        explanation: यह उन सभी यूज़र भूमिकाओं पर लागू होता है जो आमतौर पर अन्य यूज़र्स की निगरानी करती हैं। यह यूज़र को ऐसे डैशबोर्ड और फ़िल्टर देखने की अनुमति देता है जो टीम प्रबंधन में मदद करते हैं।
        label: "क्या यह प्रबंधक है?"
      managed_report:
        actions:
          reporting_locations_report:
            label: रिपोर्ट करने के स्थान केस
            explanation: "निर्धारित तारीख़ सीमा के भीतर दर्ज किए गए मामलों की संख्या के आँकड़े देखने की क्षमता, जिन्हें रिपोर्टिंग स्थान के अनुसार फ़िल्टर किया जा सकता है और उम्र तथा लिंग के आधार पर अलग-अलग दिखाया जाता है। यह अनुमति उपयोगकर्ता को Insight से डेटा एक्सपोर्ट करने की भी अनुमति देती है।"
          followups_report:
            label: फॉलो-अप (मामले) केस
            explanation: "निर्धारित तारीख़ सीमा के भीतर किए गए फॉलो-अप की संख्या के आँकड़े देखने की क्षमता, जिन्हें फॉलो-अप के प्रकार के अनुसार फ़िल्टर किया जा सकता है और उम्र तथा लिंग के आधार पर अलग-अलग दिखाया जाता है। यह अनुमति उपयोगकर्ता को Insight से डेटा एक्सपोर्ट करने की भी अनुमति देती है।"
          services_report:
            label: सेवाएँ  केस (मामले)
            explanation: "निर्धारित तारीख़ सीमा के भीतर किए गए सेवाओं की संख्या के आँकड़े देखने की क्षमता, जिन्हें सेवा के प्रकार के अनुसार फ़िल्टर किया जा सकता है और उम्र तथा लिंग के आधार पर अलग-अलग दिखाया जाता है। यह अनुमति उपयोगकर्ता को Insight से डेटा एक्सपोर्ट करने की भी अनुमति देती है।"
          protection_concerns_report:
            label: सुरक्षा चिंता केस / मामले
            explanation: निर्धारित तारीख़ सीमा के भीतर दर्ज किए गए केसों की सुरक्षा चिंताओं के आँकड़े देखने की क्षमता। यह अनुमति उपयोगकर्ता को Insight से डेटा एक्सपोर्ट करने की भी अनुमति देती है।
          managed_report_scope:
            label: "इस भूमिका को Insights में कौन-कौन से रिकॉर्ड देखने में सक्षम होना चाहिए?\n \n "
          managed_report_scope_all:
            label: सभी
          managed_report_scope_group:
            label: केवल ग्रुप के बेस्ड डेटा
          managed_report_scope_agency:
            label: केवल एजेंसी के बेस्ड पर डेटा
          violations:
            explanation: MRM गड़बड़ी इनसाइट तक पहुँचने की क्षमता
            label: उल्लंघन / नियम तोड़ना
          gbv_statistics:
            explanation: GBV आँकड़े इनसाइट देखने की क्षमता
            label: GBV आंकड़े
          ghn_report:
            explanation: MRM ग्लोबल हॉरिज़ॉन्टल नोट इनसाइट तक पहुँचने की क्षमता
            label: ग्लोबल हॉरिज़ॉन्टल नोट
          individual_children:
            explanation: MRM व्यक्तिगत बच्चों की इनसाइट तक पहुँचने की क्षमता
