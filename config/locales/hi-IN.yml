          protection_outcomes:
            label: सुरक्षा परिणाम
            explanation: सुरक्षा परिणाम मूल रूप से PCM मॉड्यूल के लिए विकसित किए गए थे। इसमें उन क्लाइंट्स का प्रतिशत शामिल है जिनकी मानसिक-समाजिक भलाई में सुधार दिखता है और जिनका कहना है कि सुरक्षा जोखिमों से कम प्रभावित हुए हैं।
          process_quality_total_cases:
            label: 'प्रक्रिया और गुणवत्ता – कुल प्रोटेक्शन केस मैनेजमेंट क्लाइंट्स की संख्या'
            explanation: केवल PCM (सुरक्षा केस प्रबंधन) मॉड्यूल के लिए लागू यह उन केसों की कुल संख्या दिखाता है जो सुरक्षा केस प्रबंधन के अंतर्गत हैं।
          process_quality_average_cases:
            label: 'प्रक्रिया और गुणवत्ता – हर केस वर्कर के औसत केस'
            explanation: केवल PCM (सुरक्षा केस प्रबंधन) मॉड्यूल के लिए लागू। यह प्रत्येक केस वर्कर द्वारा संभाले जाने वाले PCM केसों की औसत संख्या दिखाता है।
          process_quality_successful_referrals:
            label: 'प्रक्रिया और गुणवत्ता - सफल रेफ़रल का प्रतिशत'
            explanation: केवल PCM (सुरक्षा केस प्रबंधन) मॉड्यूल के लिए लागू। यह उन सेवा रेफ़रल का प्रतिशत दिखाता जो सफलतापूर्वक लागू किए गए।
          process_quality_implemented_referrals:
            label: प्रक्रिया और गुणवत्ता - लागू होने की तिथि के अनुसार सफल रेफ़रल
            explanation: केवल PCM (सुरक्षा केस प्रबंधन) मॉड्यूल के लिए लागू। यह प्रत्येक महीने में लागू किए गए सफल सेवा रेफ़रल की संख्या दिखाता है।
          case_characteristics:
            label: 'केस की विशेषताएँ'
            explanation: 'मॉड्यूल के लिए ही लागू है। यह मामलों को कई मुख्य विशेषताओं के आधार पर अलग-अलग दिखाता है, जैसे सुरक्षा जोखिम, जोखिम का स्तर, अवधि, दिव्यांग स्थिति, सुरक्षा योजना पूरी हुई या नहीं, और लिंग।'
          case_management_kpis_report:
            label: केस प्रबंधन के मुख्य प्रदर्शन संकेत
            explanation: "यह CP केस मैनेजमेंट के प्रदर्शन से जुड़े प्रमुख संकेतकों को ट्रैक करता है, जैसे अलग-अलग संबंधित लोगों द्वारा किए गए रेफरल का प्रतिशत, चुनी गई सुरक्षा चिंताओं के लिए रिपोर्टिंग स्थान और लिंग, और हर प्रकार के केस बंद होने के कारणों का प्रतिशत।"
          case_management_kpis_service_referrals_report:
            label: केस प्रबंधन के मुख्य प्रदर्शन संकेत – सेवा रेफ़रल
            explanation: प्रत्येक कई प्रकार की सेवा के अनुसार उपयुक्त सेवाओं के लिए रेफ़र किए गए केसों की संख्या
          distribution_users_role_report:
            label: भूमिका के अनुसार उपयोगकर्ताओं का वितरण
            explanation: "प्रत्येक भूमिका वाले उपयोगकर्ताओं की संख्या, उपयोगकर्ता समूह के अनुसार विभाजित। इससे आप प्रत्येक केस वर्कर के लिए निगरानी और प्रशासनिक कर्मचारियों की संख्या देख सकते हैं।"
      matching_configuration:
