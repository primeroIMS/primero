        सेवा प्रदान करने से आशय उन सेवाओं से है जो उपयोगकर्ता संगठन द्वारा सीधे (इन-हाउस) दी जाती हैं, न कि वे सेवाएँ जो अन्य सेवाओं के लिए रेफरल या आंतरिक रेफरल के माध्यम से दी जाती हैं।
