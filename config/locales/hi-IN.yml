            explanation: उपयोगकर्ता परिवार सूची या परिवार शो पेज से XLS फ़ाइल में निर्यात करने के लिए विशेष फॉर्म या फ़ील्ड चुन सकता है।
          flag:
            explanation: Ability to add a flag to a Family. Users with this permission can also remove the flags that they have added to a Family.
            label: चिन्हित करें
          resolve_any_flag:
            explanation: "यूज़र को रिकॉर्ड पर किसी भी झंडे (Flag) को सुलझाने की अनुमति देता है, चाहे उसे किसी ने भी बनाया हो।"
            label: किसी भी Flag को खत्म करें
          flag_update:
            explanation: "यूज़र को रिकॉर्ड पर किसी भी झंडे (Flag) को अपडेट करने की अनुमति देता है, चाहे उसे किसी ने भी बनाया हो।"
            label: Flag संशोधित करें
          manage:
            explanation: उपयोगकर्ता को परिवारों पर सभी उपलब्ध क्रियाएँ करने की अनुमति देता है। "मैनेज" अनुमति का मतलब मूल रूप से "सब कुछ" है।
            label: सभी अधिकारों के साथ प्रबंधित करें
          read:
            explanation: परिवार देखने की क्षमता
            label: देखें
          write:
            explanation: "Edit\" बटन पर क्लिक करने, परिवार की जानकारी अपडेट करने और \"Save\" पर क्लिक करने की क्षमता।"
            label: बदलें
          sync_mobile:
            explanation: उपयोगकर्ता को परिवार के रिकॉर्ड को ऑफ़लाइन इस्तेमाल के लिए सहेजने की अनुमति देता है।
            label: ऑफलाइन के लिए मार्क करें
          close:
            explanation: उपयोगकर्ता को खुले परिवार की स्थिति बंद करने की अनुमति देता है।
            label: बंद करें
          reopen:
            explanation: Allows a user to open a family which is currently closed.
            label: फिर से खोलें
          case_from_family:
            explanation: उपयोगकर्ताओं को फैमिली रिकॉर्ड के भीतर फैमिली मेंबर सबफॉर्म से नया केस बनाने की अनुमति देता है।
            label: नया केस बनाएँ
        label: परिवार
      report:
        actions:
          create:
            explanation: "नया रिपोर्ट बनाने की क्षमता। जब कोई यूज़र रिपोर्ट बनाता है, तो यह उन सभी यूज़र्स के लिए दिखने लगती है जिनके पास रिपोर्ट पढ़ने की (“Read” या “Group Read”) अनुमति है।"
            label: बनाएँ
          group_read:
            explanation: "सभी रिपोर्ट देखने की क्षमता। प्रत्येक रिपोर्ट में दिए गए आंकड़े केवल उन रिकॉर्ड्स को दर्शाएंगे जिन तक वर्तमान उपयोगकर्ता के उपयोगकर्ता समूह के उपयोगकर्ताओं की पहुँच है। यह अनुमति अक्सर स्थानीय, क्षेत्रीय, या एजेंसी व्यवस्थापकों द्वारा अपने टीमों या संगठन के प्रदर्शन की जानकारी प्राप्त करने के लिए इस्तेमाल की जाती है। इस अनुमति से उपयोगकर्ता रिपोर्ट से डेटा निर्यात करने की क्षमता भी प्राप्त करता है।"
            label: देखें (ग्रुप आधारित डेटा)
          manage:
            explanation: यूज़र को एजेंसियों पर सभी उपलब्ध क्रियाएं करने की अनुमति देता है। "मैनेज" अनुमति का मतलब मूल रूप से "सब कुछ" है।
            label: मैनेज करें (इस संसाधन प्रकार के लिए सभी अनुमतियाँ)
          read:
            explanation: "सभी रिपोर्ट देखने की क्षमता। हर रिपोर्ट में दिखाई गई संख्या सिस्टम के सभी रिकॉर्ड्स को दिखाएगी, केवल उन रिकॉर्ड्स को नहीं जिन तक वर्तमान यूज़र की पहुँच है। यह अनुमति यूज़र को रिपोर्ट से डेटा एक्सपोर्ट करने की भी सुविधा देती है।"
            label: देखें
          write:
            explanation: सभी रिपोर्ट (अन्य यूज़र्स द्वारा बनाई गई रिपोर्ट सहित) बदलने की क्षमता।
            label: बदलें
          agency_read:
            explanation: सभी रिपोर्ट देखने की अनुमति। हर रिपोर्ट में दिखाई गई संख्या केवल उन रिकॉर्ड्स को दिखाएगी जो वर्तमान यूज़र की एजेंसी के उपयोगकर्ताओं के लिए उपलब्ध हैं। यह अनुमति अक्सर एजेंसी एडमिनिस्ट्रेटर्स के लिए होती है।
            label: देखें (एजेंसी आधारित डेटा)
        explanation: "समेकित डेटा का विश्लेषण करने का टूल, जिसमें टेबल और ग्राफ शामिल हैं"
        label: रिपोर्ट / विवरण
      reporting_location_level:
        explanation: 'यह निर्धारित करेगा कि इस भूमिका के लिए डैशबोर्ड, फ़िल्टर, रेफ़रल मॉड्यूल और ट्रांसफर मॉड्यूल में किस स्तर के स्थान दिखाई देंगे। यदि आप इस फ़ील्ड को खाली छोड़ते हैं, तो इस भूमिका को सिस्टम का डिफ़ॉल्ट रिपोर्टिंग लोकेशन स्तर दिखाई देगा।'
        label: "इस भूमिका के लिए रिपोर्टिंग में किस प्रकार के स्थान का उपयोग किया जाना चाहिए?\n \n "
      role:
        actions:
          assign:
            explanation: "यूज़र अकाउंट बनाते या संपादित करते समय भूमिका (रोल) चुनने की अनुमति। यह अनुमति उन सभी भूमिकाओं के लिए आवश्यक है जो यूज़र अकाउंट बनाती या संपादित करती हैं। "
            label: असाइन करें
          copy:
            explanation: किसी भूमिका की कॉपी बनाने की क्षमता। यह सिस्टम व्यवस्थापकों के लिए उपयोगी है जो कई भूमिकाएँ बना रहे हैं जो एक-दूसरे के अत्यधिक समान हों (जैसे सेवा प्रदाता)।
            label: कॉपी
          create:
            explanation: रोल बना सकते हैं”
            label: बनाएं
          delete:
            explanation: रोल को डिलीट कर सकते हैं”
            label: हटाएं
          manage:
            explanation: 'उपयोगकर्ता को भूमिकाओं पर सभी उपलब्ध क्रियाएँ करने की अनुमति देता है। "संभालें" अनुमति का मतलब मूल रूप से "सब कुछ" होता है। महत्वपूर्ण: यह भूमिका बनाने और हटाने की क्षमता भी प्रदान करती है।'
            label: प्रबंधित (इस संसाधन प्रकार के सभी अनुमतियाँ)
          permitted_roles:
            explanation: "अगर किसी भूमिका (role) को ऊपर बताए गए किसी भी कार्य को करने की अनुमति है, तो वह केवल इस सूची में दी गई भूमिकाओं पर ही उन कार्यों को कर सकेगी। उदाहरण के लिए, यदि किसी भूमिका के पास \"Read\" और \"Assign\" की अनुमति है, लेकिन उसकी \"Managed Roles\" में केवल \"CP Case Worker\" और \"CP Manager\" शामिल हैं, तो वह केवल इन दो भूमिकाओं को ही देख सकेगी और नए उपयोगकर्ताओं को केवल इन्हीं दो भूमिकाओं में असाइन कर सकेगी। यदि उसी भूमिका के लिए कोई \"Managed Roles\" निर्धारित नहीं हैं, तो वह सभी भूमिकाओं को देख सकेगी और सिस्टम में किसी भी भूमिका के साथ नए उपयोगकर्ता खाते बना सकेगी"
            label: इस रोल द्वारा संभाले जाने वाले अन्य रोल्स
          read:
            explanation: रोल देखने की एबिलिटी
            label: देखें
          write:
            explanation: "शो रोल पेज पर \"संपादित करें\" बटन पर क्लिक करने, भूमिका की अनुमतियाँ अपडेट करने, और फिर भूमिका को सेव करने की क्षमता।"
            label: बदलें
        explanation: "निर्धारित करे, कि उपयोगकर्ता सिस्टम में कौन-कौन सी क्रियाएँ कर सकता है।"
        label: भूमिका
      system:
        actions:
          manage:
            explanation: "सिस्टम संपर्क जानकारी, डिफ़ॉल्ट नोटिफिकेशन और वेलकम ईमेल सेटिंग्स, तथा सिंक्रोनाइज़्ड सर्वरों की जानकारी को देखने और अपडेट करने की क्षमता। यह अनुमति सामान्यतः सिस्टम एडमिनिस्ट्रेटर के लिए आरक्षित होती है।"
            label: इस संसाधन को पूरी तरह से संभालें
        explanation: अलग-अलग सिस्टम कॉन्फ़िगरेशन सेटिंग्स
        label: सिस्टम
      tracing_request:
        actions:
          change_log:
            explanation: उपयोगकर्ता रिकॉर्ड बनाये जाने के बाद किए गए सभी परिवर्तनों का इतिहास देख सकता है। इसमें सभी फ़ील्ड में दर्ज किए गए मान शामिल हैं।
            label: बदलाव लॉग
          access_log:
            explanation: उपयोगकर्ता रिकॉर्ड बनाये जाने के बाद से उस तक पहुँचने वाले सभी गैर-स्वामी उपयोगकर्ताओं (देखने और अपडेट करने) का इतिहास देख सकता है।
            label: एक्सेस लॉग
          create:
            explanation: ट्रेसिंग रिक्वेस्ट बनाने की क्षमता
            label: बनाएं
          enable_disable_record:
            explanation: किसी ट्रेसिंग रिक्वेस्ट को बंद या चालू करने की क्षमता। "बंद" ट्रेसिंग रिक्वेस्ट डिफ़ॉल्ट रूप से ट्रेसिंग रिक्वेस्ट सूची में नहीं दिखती। उपयोगकर्ता फ़िल्टर के माध्यम से "बंद" को ट्रेसिंग रिक्वेस्ट सूची में देख सकते हैं।
            label: चालू / बंद
          export_case_pdf:
            explanation: "उपयोगकर्ता ट्रेसिंग रिक्वेस्ट सूची या ट्रेसिंग रिक्वेस्ट शो पेज से PDF फ़ाइल एक्सपोर्ट कर सकता है, जिसमें सभी फ़ील्ड शामिल हैं जिन तक वर्तमान उपयोगकर्ता की पहुँच है, चाहे वह एक, कई, या सभी रिकॉर्ड हों। PDF एक्सपोर्ट फ़ाइल में जानकारी सबसे पहले केस के अनुसार सूचीबद्ध होती है, और फिर उस फॉर्म के अनुसार व्यवस्थित की जाती है जिसमें जानकारी दिखाई देती है।"
            label: पीडीएफ़ एक्सपोर्ट करें
          export_csv:
            explanation: "उपयोगकर्ता ट्रेसिंग रिक्वेस्ट सूची या ट्रेसिंग रिक्वेस्ट शो पेज से CSV फ़ाइल एक्सपोर्ट कर सकता है, जिसमें सभी फ़ील्ड शामिल हैं जिन तक वर्तमान उपयोगकर्ता की पहुँच है, चाहे वह एक, कई, या सभी ट्रेसिंग रिक्वेस्ट हों।"
            label: CSV एक्सपोर्ट करें
          export_custom:
            explanation: "उपयोगकर्ता ट्रेसिंग रिक्वेस्ट सूची या ट्रेसिंग रिक्वेस्ट शो पेज से XLS फ़ाइल एक्सपोर्ट कर सकता है, जिसमें कस्टम फॉर्म या फ़ील्ड शामिल होते हैं, चाहे वह एक, कई, या सभी ट्रेसिंग रिक्वेस्ट हों जिन तक उपयोगकर्ता की पहुँच है। इस एक्सपोर्ट में, प्रत्येक फॉर्म XLS फ़ाइल में अपनी अलग टैब में दिखाया जाता है। उपयोगकर्ता कस्टम एक्सपोर्ट मोडल का उपयोग करके चुन सकते हैं कि वे कौन से फॉर्म या फ़ील्ड एक्सपोर्ट में शामिल करना चाहते हैं। कृपया ध्यान दें कि उपयोगकर्ता केवल उन्हीं फॉर्म और फ़ील्ड को एक्सपोर्ट में शामिल कर सकते हैं जिन्हें वे एप्लिकेशन में ट्रेसिंग रिक्वेस्ट देखते समय पहले से देख"
            label: कस्टम एक्सपोर्ट करें
          export_json:
            explanation: "उपयोगकर्ता ट्रेसिंग अनुरोध सूची या ट्रेसिंग अनुरोध के विवरण पेज से JSON फ़ाइल एक्सपोर्ट बना सकता है, जिसमें उन सभी फ़ील्ड्स की जानकारी होती है जिन तक वर्तमान उपयोगकर्ता की पहुँच है। यह एक, कई या सभी ट्रेसिंग अनुरोधों के लिए किया जा सकता है, जिन तक उपयोगकर्ता की पहुँच हो। यह एक्सपोर्ट मुख्य रूप से उन लोगों के लिए उपयोगी है जो वर्तमान Primero सिस्टम से ट्रेसिंग अनुरोधों को एक्सपोर्ट करके किसी दूसरे Primero सिस्टम या किसी अन्य सूचना प्रबंधन प्रणाली में इम्पोर्ट करना चाहते हैं। JSON फ़ॉर्मेट मशीन द्वारा पढ़ने के लिए बनाया गया है, इसलिए यह सामान्य उपयोगकर्ताओं के लिए ज्यादा उपयोगी नहीं होता।"
            label: JSON एक्सपोर्ट करें
          export_list_view_csv:
            explanation: "उपयोगकर्ता ट्रेसिंग अनुरोध सूची पेज से CSV फ़ाइल एक्सपोर्ट बना सकता है, जिसमें वही फ़ील्ड्स शामिल होते हैं जो उसे ट्रेसिंग अनुरोध सूची में दिखाई देते हैं। यह केवल ट्रेसिंग अनुरोध सूची पेज से ही किया जा सकता है।"
            label: " एक्सपोर्ट सूची  दृश्य CSV"
          export_pdf:
            explanation: "उपयोगकर्ता ट्रेसिंग अनुरोध सूची या ट्रेसिंग अनुरोध के विवरण पेज से PDF फ़ाइल एक्सपोर्ट बना सकता है, जिसमें उन सभी फ़ील्ड्स की जानकारी होती है जिन तक वर्तमान उपयोगकर्ता की पहुँच है। यह एक, कई या सभी रिकॉर्ड्स के लिए किया जा सकता है, जिन तक उपयोगकर्ता की पहुँच हो। PDF फ़ाइल में जानकारी पहले केस के अनुसार दिखाई जाती है, और उसके बाद उस फ़ॉर्म के आधार पर व्यवस्थित की जाती है जिसमें यह जानकारी दर्ज होती है।"
            label: पीडीएफ़ एक्सपोर्ट करें
          export_xls:
            explanation: 'उपयोगकर्ता ट्रेसिंग अनुरोध सूची या ट्रेसिंग अनुरोध के विवरण पेज से XLS फ़ाइल एक्सपोर्ट बना सकता है, जिसमें उन सभी फ़ील्ड्स की जानकारी होती है जिन तक वर्तमान उपयोगकर्ता की पहुँच है। यह एक, कई या सभी ट्रेसिंग अनुरोधों के लिए किया जा सकता है, जिन तक उपयोगकर्ता की पहुँच हो। इस एक्सपोर्ट में हर फ़ॉर्म XLS फ़ाइल के अंदर अपने अलग टैब में दिखाया जाता है। ध्यान दें: XLS फ़ॉर्मेट में गैर-लैटिन अक्षर (जैसे अरबी, बंगला) सही और आसानी से पढ़े जा सकते हैं, जबकि CSV एक्सपोर्ट में ऐसा नहीं होता।'
            label: Excel (XLS फ़ाइल) एक्सपोर्ट
          flag:
            explanation: किसी तरह के फ्लैग को ट्रेसिंग अनुरोध ( रिक्वेस्ट ) में जोड़ने की क्षमता। उपयोगकर्ता अनुमति के साथ अपने द्वारा जोड़े गए फ्लैग को ट्रेसिंग अनुरोध ( रिक्वेस्ट ) से हटा भी सकते हैं।
            label: फ़्लैग
          resolve_any_flag:
            explanation: "उपयोगकर्ता को रिकॉर्ड पर मौजूद किसी भी फ्लैग को सुलझाने/समाप्त करने की अनुमति देता है, चाहे वह फ्लैग किसी ने भी बनाया हो।"
            label: किसी भी फ़्लैग को हल करें
          flag_update:
            explanation: "उपयोगकर्ता को रिकॉर्ड पर मौजूद किसी भी फ्लैग को अपडेट करने की अनुमति देता है, चाहे वह फ्लैग किसी ने भी बनाया हो।"
            label: फ़्लैग अपडेट
          import:
            explanation: "उपयोगकर्ता को CSV, Excel या JSON फ़ाइल से डेटा इम्पोर्ट करके एक या अधिक नए केस बनाने की अनुमति देता है। सही तरीके से जानकारी इम्पोर्ट करने के लिए फ़ाइल का फॉर्मेट बहुत ही विशेष (सटीक) होना जरूरी है। यह सुविधा केवल उन प्रशासनिक उपयोगकर्ताओं के लिए होनी चाहिए जिनके पास उन्नत तकनीकी कौशल और Primero में डेटा फॉर्मेट की गहरी समझ हो। यह केवल केस सूची पेज से ही किया जा सकता है।"
            label: इम्पोर्ट करें
          manage:
            explanation: उपयोगकर्ता को ट्रेसिंग अनुरोधों पर उपलब्ध सभी कार्य करने की अनुमति देता है। "मैनेज" अनुमति का मतलब है सभी काम करने की पूरी अनुमति।
            label: मैनेज करें ( इस रिसोर्स प्रकार के सभी परमिशन के लिए )
          read:
            explanation: "ट्रेसिंग अनुरोध देखने की क्षमता। जिन भूमिकाओं (रोल) को ट्रेसिंग अनुरोध देखने की अनुमति है, उन्हें संभावित मैच (Potential Match) रिकॉर्ड प्रकार देखने की अनुमति भी होनी चाहिए।"
            label: देखें
          write:
            explanation: बदलें बटन पर क्लिक करके ट्रेसिंग अनुरोध की जानकारी अपडेट करने और "Save" पर क्लिक करने की क्षमता। साथ ही उपयोगकर्ता ट्रेसिंग अनुरोध को सक्षम (Enable) या अक्षम (Disable) भी कर सकता है।
            label: बदलें
        explanation: यह उस व्यक्ति को दर्शाता है जो बिना साथ वाले या अलग हुए केस (बच्चे/व्यक्ति) को खोजकर उससे दोबारा मिलाने की कोशिश कर रहा है।
        label: खोज रिक्वेस्ट
      transfer:
        actions:
          transfer:
            explanation: "इसका मतलब है कि जब उपयोगकर्ता बाहरी रेफरल करता है, तब \"प्राप्तकर्ता का प्रकार\" (Type of Recipient) में यह भूमिका एक विकल्प के रूप में दिखाई देगी। यदि उपयोगकर्ता इस भूमिका को ट्रांसफर के प्रकार के रूप में चुनता है, तो ट्रांसफर सबमिट करते समय Primero जो एक्सपोर्ट फ़ाइल बनाता है, उसमें केवल वही जानकारी शामिल होगी जिन फ़ॉर्म्स तक इस भूमिका की पहुँच है। उदाहरण के लिए, यदि उपयोगकर्ता \"Medical Service Provider\" को प्राप्तकर्ता के प्रकार के रूप में चुनता है, और इस भूमिका को केवल Basic Identity और Protection Concerns फ़ॉर्म्स की ही पहुँच है, तो बाहरी ट्रांसफर के लिए बनने वाली एक्सपोर्ट फ़ाइल में केवल उन्हीं दो फ़ॉर्म्स के फ़ील्ड्स शामिल होंगे।"
            label: "क्या इस भूमिका का उपयोग बाहरी ट्रांसफर के लिए किया जा सकता है?"
        label: स्थान बदलें
      user:
        actions:
          agency_read:
            explanation: "उपयोगकर्ता केवल अपने संगठन (agency) के ही यूज़र खातों को देख सकता है। इससे यह भी तय होता है कि वह किन यूज़र खातों पर अन्य कार्य कर सकता है। उदाहरण के लिए, यदि उपयोगकर्ता के पास यूज़र्स पर \"Write\" की अनुमति है, लेकिन साथ में \"Agency Read\" की अनुमति भी है, तो वह केवल अपने संगठन के यूज़र खातों को ही संपादित कर पाएगा। इसी तरह, यदि उपयोगकर्ता के पास यूज़र्स पर \"Manage\" की अनुमति है, लेकिन \"Agency Read\" की अनुमति भी है, तो वह केवल अपने संगठन के लिए ही नए यूज़र बना पाएगा।"
            label: देखें (एजेंसी के अंदर)
          create:
            explanation: नया यूज़र खाता बनाने की सुविधा।
            label: बनाएं
          disable_multiple:
            explanation: यूज़र सूची से एक साथ कई यूज़र्स को बंद करें। बंद किए गए यूज़र्स अब सिस्टम का उपयोग नहीं कर पाएंगे।
            label: कई यूज़र्स को बंद करें
          manage:
            explanation: 'उपयोगकर्ता को यूज़र्स पर सभी उपलब्ध कार्य करने की अनुमति देता है। "Manage" अनुमति का मतलब है "सब कुछ"। महत्वपूर्ण: इससे नए यूज़र खाते बनाने की अनुमति भी मिलती है।'
            label: पूरा नियंत्रण (इस प्रकार के सभी कार्यों की अनुमति)
          read:
            explanation: "उपयोगकर्ता खातों को देखने की अनुमति। डिफ़ॉल्ट रूप से हर उपयोगकर्ता अपने खाते की जानकारी (जैसे पासवर्ड, ईमेल) देख और बदल सकता है।"
            label: देखें
          write:
            explanation: यूज़र पेज पर "Edit" बटन पर क्लिक करके उपयोगकर्ता की जानकारी अपडेट करने और उसे सेव करने की अनुमति। ध्यान दें कि इस अनुमति से यूज़र खातों को बंद करने की सुविधा भी मिलती है।
            label: बदलें
        explanation: एक अलग उपयोगकर्ता खाते को दर्शाता है।
        label: उपयोगकर्ता
      user_group:
        actions:
          assign:
            explanation: "उपयोगकर्ता खाता बनाते या संपादित करते समय यूज़र समूह चुनने की अनुमति। ध्यान दें कि यदि वर्तमान उपयोगकर्ता के पास \"केवल मेरे समूह के रिकॉर्ड या यूज़र\" का एक्सेस है, तो वह केवल अपने ही यूज़र समूहों में से एक या अधिक समूह चुन पाएगा। इसका मतलब है कि यूज़र समूह असाइन करने की अनुमति रखने वाला मैनेजर केवल उन्हीं समूहों में किसी यूज़र को जोड़ सकता है, जिनका वह खुद सदस्य है। यह अनुमति उन सभी भूमिकाओं के लिए जरूरी है जो यूज़र खाते बनाती या संपादित करती हैं।"
            label: असाइन करें
          create:
            explanation: यूज़र समूह बनाने की अनुमति।
            label: बनाएं
          delete:
            explanation: यूज़र समूह हटाने की अनुमति।
            label: हटाएं
          manage:
            explanation: 'उपयोगकर्ता को यूज़र समूहों पर सभी उपलब्ध कार्य करने की अनुमति देता है। "Manage" अनुमति का मतलब है "सब कुछ"। महत्वपूर्ण: इससे यूज़र समूह बनाने और हटाने की अनुमति भी मिलती है।'
            label: पूरा नियंत्रण (इस प्रकार के सभी कार्यों की अनुमति)
          read:
            explanation: यूज़र समूहों को देखने की अनुमति।
            label: देखें
          write:
            explanation: यूज़र समूहों में बदलाव करने की अनुमति।
            label: बदलें
        explanation: यह एक टीम या ऐसे यूज़र्स के समूह को दर्शाता है जो आपस में जानकारी साझा कर सकते हैं। आम तौर पर मैनेजर अपने यूज़र समूह में सामाजिक कार्यकर्ताओं द्वारा संभाले गए सभी रिकॉर्ड देख सकते हैं।
        label: यूज़र समूह
      webhook:
        actions:
          read:
            label: देखें
            explanation: API के माध्यम से वेबहुक सेटिंग्स की सूची देखने और जांच करने की अनुमति।
          write:
            label: बदलें
            explanation: API के जरिए वेबहुक सेटिंग्स बनाने और बदलने की अनुमति।
          create:
            explanation: API के जरिए वेबहुक सेटिंग बनाने की अनुमति।
            label: बनाएं
          delete:
            explanation: API के जरिए वेबहुक सेटिंग हटाने की अनुमति।
            label: हटाएं
          manage:
            label: पूरा नियंत्रण (इस प्रकार के सभी कार्यों की अनुमति)
            explanation: यह सिस्टम भूमिकाओं के लिए उपयोग होता है जो Primero Webhooks के माध्यम से अन्य सिस्टम्स से जुड़ते हैं। गैर-डेवलपर उपयोग के लिए इसकी सिफारिश नहीं की जाती है।
      activity_log:
        actions:
          transfer:
            explanation: यह सिस्टम भूमिकाओं के लिए उपयोग होता है जो Primero Webhooks के माध्यम से अन्य सिस्टम्स से जुड़ते हैं। गैर-डेवलपर उपयोग के लिए इसकी सिफारिश नहीं की जाती है।
            label: ट्रांसफर
          manage:
            label: पूरा नियंत्रण (इस प्रकार के सभी कार्यों की अनुमति)
            explanation: सब कुछ देखने और उपयोग करने की अनुमति।
        label: एक्टिविटी लॉग
      usage_report:
        actions:
          read:
            explanation: उपयोग रिपोर्ट पेज देखने की अनुमति।
            label: उपयोग रिपोर्ट पेज खोलने की अनुमति।
