      helptext: |
        यह संकेतक दर्शाता है कि प्रत्येक रिपोर्टिंग साइट पर हर महीने कितने नए मामले दर्ज किए जाते हैं।
        रिपोर्टिंग साइट से आशय उस स्थान से है जहाँ उपयोगकर्ता संगठन सेवाएँ प्रदान कर रहा है और जहाँ मामला सेवा प्रदाता को रिपोर्ट किया गया है।
