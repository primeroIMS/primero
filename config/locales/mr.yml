      reporting_site: "रिपोर्टिंग साइट"
      helptext: |
        हा निर्देशक प्रत्येक रिपोर्टिंग साइटवर दरमहा किती नवीन केसेस उघडल्या जातात याची गणना करतो.
        रिपोर्टिंग साइट म्हणजे अशी साइट जिथे यूजर संस्था सेवा पुरवत आहे आणि
        जिथे सेवा प्रदात्याकडे केसची नोंद केली जाते.
    number_of_incidents:
      title: "2. रेकॉर्ड केलेल्या घटनांची संख्या"
      reporting_site: "रिपोर्टिंग साइट"
      helptext: |
        हा निर्देशक प्रत्येक रिपोर्टिंग साइटवर दरमहा किती नवीन घटना उघडल्या जातात याची गणना करतो.
        रिपोर्टिंग साइट म्हणजे अशी साइट जिथे यूजर संस्था सेवा पुरवत आहे आणि
        जिथे सेवा प्रदात्याकडे घटनांची नोंद केली जाते.
    reporting_delay:
      title: "3. अहवाल देण्यास विलंब"
      delay: "विलंब"
      total_incidents: "एकूण घटना"
      helptext: |
        हे सूचक, सर्वाइवरने GBV अनुभव घेतल्यापासून ते सेवा प्रदात्याकडे त्याची प्रथम तक्रार करेपर्यंतच्या 
        कालावधीत गेलेल्या दिवसांची संख्या मोजते आणि त्याचे वर्गीकरण करते. यूजर संस्थेकडे 
        घटनेची प्रथम तक्रार केव्हा केली गेली, यावर आधारित याची गणना केली जाते. डेटाचे 
        वर्गीकरण वेगवेगळ्या कालावधीनुसार केले जाते (0-3 दिवस; 4-5 दिवस; 6-14 दिवस; 15-30 दिवस; 
        1 महिन्यापेक्षा जास्त; 3 महिन्यांपेक्षा जास्त).
    service_access_delay:
      title: "सेवा प्रवेशास विलंब"
      delay: "विलंब"
      total_incidents: "एकूण घटना"
    assessment_status:
      title: "4. मूल्यांकन स्थिती"
      completed: "पूर्ण झाले"
      completed_supervisor_approved: "पूर्ण झाले आणि पर्यवेक्षकाने मंजूर केले"
      helptext: |
        हा निर्देशक, ज्या सक्रिय केसेससाठी मूल्यांकन अर्ज पूर्ण भरला गेला आहे, त्यांचे प्रमाण मोजतो. जेव्हा सर्वाइवरच्या  मूल्यमापन अर्जामधील अनिवार्य रकाने भरले जातात, तेव्हा मूल्यांकन पूर्ण झाले असे मानले जाते.
    completed_case_safety_plans:
      title: "5.  पूर्ण झालेल्या केसची सुरक्षा योजना"
      completed: "पूर्ण झालेल्या केसची सुरक्षा योजना"
      helptext: |
        हा निर्देशक अशा सक्रिय प्रकरणांचे प्रमाण मोजतो, ज्यांच्यासाठी सुरक्षा योजना आवश्यक
        मानली गेली आणि पूर्ण केली गेली (उदा. जवळच्या जोडीदाराकडून होणारी हिंसा, आत्महत्या/हत्येचा धोका, बाल संरक्षण). 
        जेव्हा सुरक्षा योजना फॉर्ममधील अनिवार्य रकाने भरले जातात, तेव्हा सुरक्षा 
        योजना पूर्ण झाली असे मानले जाते.
    completed_case_action_plans:
      title: "6. पूर्ण झालेल्या केसचे कृती योजना "
      completed: "पूर्ण झालेल्या केसचे कृती योजना "
      label: "पूर्ण झालेल्या केसचे कृती योजना "
      helptext: |
        हे सूचक अशा सक्रिय केसचे प्रमाण मोजते, ज्यांच्यासाठी केस कृती आराखडा 
        पूर्ण करण्यात आला आहे. कृती योजना फॉर्ममधील काही अनिवार्य रकाने पूर्ण केले गेले असल्यास, 
        तो कृती योजना पूर्ण झाला असे मानले जाते.
    completed_supervisor_approved_case_action_plans:
      title: "7. पर्यवेक्षकाने मंजूर केलेल्या केसचे कृती आराखडे"
      completed_and_approved: "पर्यवेक्षकांकडून मंजूर झालेल्या पूर्ण केलेल्या केसचे कृती आराखडे"
      helptext: |
        हे सूचक अशा सक्रिय प्रकरणांचे प्रमाण मोजते, ज्यांच्यासाठी केस कृती आराखडा 
        पूर्ण करण्यात आला असून, त्याला पर्यवेक्षकाकडून मंजुरी मिळाली आहे. कृती योजना फॉर्ममधील काही अनिवार्य रकाने पूर्ण केले जातात, 
        तेव्हा तो कृती योजना पूर्ण झाल्याचे मानले जाते. जेव्हा संबंधित कर्मचारी केस आराखड्याच्या 
        मंजुरीसाठी विनंती करतो आणि पर्यवेक्षक त्या आराखड्याला संबंधित प्लॅटफॉर्मवर मंजुरी देतो, 
        तेव्हा तो केस योजना मंजूर झाल्याचे मानले जाते.
    services_provided:
      title: "8. पुरवल्या जाणाऱ्या सेवा"
      service: "सेवा"
      count: "दिलेल्या वेळा"
      male: "पुरुष"
      female: "स्त्री "
      0-11: "0-11"
      12-17: "12-17"
      ">18": ">18"
      disability: "अपंगत्व"
      no_disability: "अपंगत्व नाही"
      helptext: |
        हा निर्देशक केस व्यवस्थापन प्रक्रियेत सर्वाइवरना प्रदान केलेल्या सेवेच्या(सेवांच्या) प्रकाराची 
        गणना करतो. प्रदान केलेली सेवा म्हणजे यूजर संस्थेद्वारे अंतर्गतरीत्या प्रदान केलेली सेवा, 
        इतर सेवांकडे केलेल्या रेफरलद्वारे किंवा अंतर्गत रेफरलद्वारे प्रदान केलेली सेवा नव्हे.
