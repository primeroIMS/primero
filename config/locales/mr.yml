    apply_label_bold: "बदल लोड होत असताना, प्रायमेरो काही मिनिटांसाठी यूजर्सना उपलब्ध नसेल."
    version_mismatch_tooltip: "तुम्ही हे कॉन्फिगरेशन लागू करू शकत नाही; कारण, तुमच्या साइटवर सध्या कार्यरत असलेल्या प्रायमेरोच्या आवृत्तीपेक्षा उच्च आवृत्ती वापरून हे कॉन्फिगरेशन तयार करण्यात आले आहे. कृपया, जोपर्यंत तुम्ही प्रायमेरोची अद्ययावत आवृत्ती वापरण्यास सुरुवात करत नाही, तोपर्यंत हे कॉन्फिगरेशन लागू करण्यासाठी प्रतीक्षा करा."
    send_header: प्रॉडक्शनसाठी पाठवा
    send_text: "तुम्हाला खात्री आहे का? जर तुम्ही पाठवा वर क्लिक केले तर तुम्ही हे कॉन्फिगरेशन तुमच्या प्रोडक्शन साइटवर पाठवाल. जोपर्यंत त्या साइटवरील प्रशासक ते मॅन्युअली लागू करत नाही तोपर्यंत हे कॉन्फिगरेशन प्रोडक्शनवर लागू होणार नाही."
