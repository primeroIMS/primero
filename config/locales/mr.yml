            explanation: "प्रत्येक भूमिकेतील यूजर्सची संख्या, यूजर गटानुसार विभागून देते. यामुळे तुम्हाला प्रत्येक केस वर्कर्समागे पर्यवेक्षकीय आणि प्रशासकीय कर्मचाऱ्यांची संख्या पाहता येते."
      matching_configuration:
        actions:
          manage:
            explanation: "शोध विनंती आणि केसेस यांच्यातील जुळणारे भाग शोधण्यासाठी कोणत्या फील्ड्सची तुलना करायची हे नियंत्रित करण्याची क्षमता. यामुळे संपूर्ण सिस्टीममध्ये जुळणी कशी चालवायची हे नियंत्रित होत असल्यामुळे, ही मंजूरी सामान्यतः फक्त सिस्टीम ॲडमिनिस्ट्रेटरलाच उपलब्ध असावी."
            label: व्यवस्थापित करा (या संसाधन प्रकारासाठीच्या सर्व परवानग्या)
        explanation: कुटुंब शोध आणि पुनर्मिलन दरम्यान शोध विनंत्यांची केसेसशी तुलना करण्यासाठी कोणत्या फील्डचा वापर केला जातो हे नियंत्रित करते.
        label: सारखे कॉन्फिगरेशन
      metadata:
        actions:
          manage:
            explanation: "फॉर्म, फॉर्म फील्ड्स आणि लुकअप्स तयार करणे, एडिट करणे, भाषांतरित करणे आणि हटवण्याची क्षमता. कृपया लक्षात घ्या की ही परवानगी असलेला यूजर केवळ त्याच फॉर्म्सचे व्यवस्थापन करू शकेल ज्यांमध्ये त्याला प्रवेश आहे. उदाहरणार्थ, जर एखाद्या राष्ट्रीय प्रशासकाला केसेसवरील केवळ 'रेकॉर्ड मालक' फॉर्म पाहण्याची क्षमता असेल, तर तो फक्त याच फॉर्मचे कॉन्फिगरेशन अपडेट करू शकेल."
            label: व्यवस्थापित करा (या संसाधन प्रकारासाठीच्या सर्व परवानग्या)
        explanation: "प्रायमेरो फॉर्म्स आणि फील्ड्स, तसेच त्यामध्ये वापरले जाणारे लुकअप पर्याय कॉन्फिगर करण्याच्या क्षमतेवर नियंत्रण ठेवते."
        label: "फॉर्म्स, लुकअप्स"
      module:
        actions:
          cp:
            label: CP
          gbv:
            label: GBV
          mrm:
            label: MRM
        explanation: ही भूमिका कोणत्या मॉड्यूल्सना लागू होते हे नियंत्रित करते
        label: "मॉड्यूल्स "
