          find_tracing_match:
            explanation: "याचा वापर केवळ कौटुंबिक शोध आणि पुनर्मिलन प्रक्रियेच्या संदर्भात केला जातो. ही मंजूरी असलेल्या यूजर्सना केस दाखवा पेजवर \"ट्रेसिंग मॅच शोधा\" हे बटण दिसेल. जेव्हा ते त्यावर क्लिक करतील, तेव्हा त्यांना सिस्टममधील शोध विनंत्यांची एक सूची दिसेल, ज्या त्यांच्या केससाठी संभाव्य जुळणाऱ्या आहेत."
            label: केसमधून ट्रेसिंग मॅच शोधा
          flag:
            explanation: केसला फ्लॅग जोडण्याची क्षमता. ही परवानगी असलेले यूजर्स त्यांनी केसला लावलेले फ्लॅग काढून टाकू शकतात.
            label: फ्लॅग
          resolve_any_flag:
            explanation: "फ्लॅग कोणीही तयार केला असला तरी, यूजरला रेकॉर्डवरील कोणत्याही फ्लॅगचे निराकरण करण्याची परवानगी देते."
            label: कोणत्याही फ्लॅगचे निराकरण करा
          flag_update:
            explanation: "फ्लॅग कोणीही तयार केला असला तरी, यूजरला रेकॉर्डवरील कोणताही फ्लॅग अपडेट करण्याची मंजूरी देते."
            label: फ्लॅग अपडेट करा
          import:
            explanation: "यूजरला CSV, एक्सेल, किंवा JSON फाईलमधून केसेस इम्पोर्ट करून एक किंवा अधिक नवीन केसेस तयार करण्याची परवानगी देते. माहिती योग्यरित्या इम्पोर्ट होण्यासाठी, इम्पोर्ट केलेली फाईल *अतिशय* विशिष्ट फॉरमॅटमध्ये असणे आवश्यक आहे. हे फंक्शन केवळ प्रगत तांत्रिक कौशल्ये आणि प्रायमेरोमध्ये डेटा कसा फॉरमॅट केला जातो याचे सखोल ज्ञान असलेल्या प्रशासकीय यूजर्ससाठीच उपलब्ध असावे. हे फक्त केस यादी पेजवरूनच केले जाते."
            label: "इम्पोर्ट करा "
          incident_details_from_case:
            explanation: "शोध परिणामांमध्ये सापडलेल्या, परंतु ज्यात तुम्हाला प्रवेश नाही अशा केससाठी घटना तपशील सबफॉर्ममध्ये नोंद जोडण्याची क्षमता. यूजर शोध परिणामांच्या पृष्ठावरून एक किंवा अधिक केस निवडून, नंतर कृती मेनूमधून \"घटना जोडा\" निवडून ही कृती करतो. त्यानंतर यूजरला घटना तपशील सबफॉर्मवरील सर्व फील्ड्स असलेला एक मोडल दिसतो, जिथे ते सेवेबद्दल माहिती प्रविष्ट करून सबमिट करू शकतात. ही कृती केवळ शोध परिणामांच्या पृष्ठावरूनच केली जाऊ शकत असल्याने, एखाद्या भूमिकेकडे 'इतर यूजर्सच्या मालकीच्या केस रेकॉर्डचा शोध घ्या' ही परवानगी असेल तरच त्यांच्याकडे ही परवानगी असणे अर्थपूर्ण ठरते."
            label: शोध परिणाम पृष्ठावरून दुसऱ्या यूजरच्या केसमध्ये घटनेचा तपशील जोडा
          incident_from_case:
            explanation: "ही परवानगी यूजरला 'घटना तयार करा' बटणावर क्लिक करण्याची अनुमती देते. यामुळे एक घटना निर्माण होते, ज्यामध्ये केसमधून कॉपी केलेली काही माहिती असू शकते. GBV प्रकरणांसाठी, हे बटण शोकेस पेजच्या सर्वात वर असते आणि ते संपूर्ण केसच्या माहितीशी संबंधित असते. काही घटना-ट्रॅकिंग संदर्भांमध्ये, हे बटण \"घटनेचा तपशील\" सबफॉर्मवर असते. या परिस्थितीत, ज्या ठिकाणी बटण क्लिक केले होते त्या घटनेच्या तपशील सबफॉर्ममधून, तसेच संपूर्ण केसमधून काही माहिती कॉपी केली जाऊ शकते. म्हणजेच, तयार केलेल्या नवीन घटनेमध्ये वैयक्तिक घटनेच्या तपशील सबफॉर्ममधील \"हिंसेचा प्रकार\" हे फील्ड असू शकते, पण त्यात केसच्या व्यक्तीचे वय आणि लिंग यांचाही समावेश असू शकतो. लक्षात घ्या की ही परवानगी यूजरला तयार केलेल्या घटनेची लिंक पाहण्याची देखील अनुमती देते."
            label: केसमधून घटना तयार करा
          remove_alert:
            explanation: "ही परवानगी यूजरला केसमधून इशारा काढून टाकण्याची मुभा देते. जेव्हा एखादे विशिष्ट फील्ड एडिट केले जाते, जसे की नोट्स अपडेट केल्यावर, तेव्हा सामान्यतः इशारे तयार होतात. इशारा सहसा केसच्या पुढे पिवळ्या ठिपक्याने दर्शविले जातात."
