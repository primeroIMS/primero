      transfer:
        actions:
          transfer:
            explanation: "याचा अर्थ असा की, जेव्हा युजर बाह्य रेफरल करतो, तेव्हा 'प्राप्तकर्त्याचा प्रकार' साठी ही भूमिका एक पर्याय म्हणून दिसेल. जर युजरने हस्तांतरणाचा प्रकार म्हणून ही भूमिका निवडली, तर जेव्हा युजर हस्तांतरण सादर करेल तेव्हा प्रायमेरोद्वारे तयार होणाऱ्या एक्सपोर्टमध्ये फक्त तीच माहिती असेल जी या भूमिकेला प्रवेश असलेल्या फॉर्ममध्ये आढळते. म्हणून, उदाहरणार्थ, जर युजरने प्राप्तकर्त्याचा प्रकार म्हणून 'वैद्यकीय सेवा प्रदाता' निवडला, आणि वैद्यकीय सेवा प्रदाता भूमिकेला फक्त 'मूलभूत ओळख' आणि 'संरक्षण चिंता' या फॉर्ममध्ये प्रवेश असेल, तर बाह्य हस्तांतरणासाठी प्रायमेरोद्वारे एक्सपोर्ट केलेल्या एक्सपोर्ट फाइलमध्ये फक्त तीच फील्ड्स असतील जी त्या दोन फॉर्ममध्ये आहेत."
            label: "या भूमिकेचा वापर बाह्य हस्तांतरणासाठी केला जाऊ शकतो का?"
