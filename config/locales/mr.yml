            explanation: "शो युजर पेजवरील 'एडिट' बटणावर क्लिक करून, युजरबद्दलची माहिती अद्ययावत करण्याची आणि नंतर जतन करण्याची क्षमता. कृपया लक्षात घ्या की ही परवानगी युजर खाती निष्क्रिय करण्याची क्षमता देखील देते."
            label: एडिट करा
        explanation: एक वैयक्तिक युजर खाते दर्शवते.
        label: "यूजर्स "
      user_group:
        actions:
          assign:
            explanation: "युजर खाते तयार करताना किंवा एडिट करताना युजर गट निवडण्याची क्षमता. कृपया लक्षात घ्या की जर सध्याच्या युजरकडे \"फक्त माझ्या गटातील रेकॉर्ड किंवा युजर्स\" या स्तराचा प्रवेश असेल, तर ते तयार करत असलेल्या किंवा एडिट करत असलेल्या युजर खात्यासाठी फक्त *त्यांच्या स्वतःच्या* एक किंवा अधिक युजर गटांची निवड करू शकतील. याचा अर्थ असा की, युजर गट नियुक्त करण्याची क्षमता असलेला व्यवस्थापक केवळ त्याच युजर गटांमध्ये युजरला जोडू शकेल, ज्या गटांमध्ये तो सध्या सदस्य आहे. युजर खाती तयार करणाऱ्या किंवा एडिट करणाऱ्या कोणत्याही भूमिकेसाठी ही परवानगी आवश्यक आहे."
            label: नियुक्त करा
          create:
            explanation: युजर गट तयार करण्याची क्षमता.
            label: तयार करा
          delete:
            explanation: युजर गट हटवण्याची क्षमता.
            label: हटवा
          manage:
            explanation: 'यूजरला युजर गटांवर सर्व उपलब्ध क्रिया करण्याची परवानगी देते. "व्यवस्थापित करा" परवानगीचा अर्थ मुळात "सर्वकाही" असा होतो. महत्त्वाचे: यामुळे नवीन युजर गट तयार करण्याची आणि हटवण्याची क्षमता देखील मिळते.'
            label: व्यवस्थापित करा (या संसाधन प्रकारासाठीच्या सर्व परवानग्या)
          read:
            explanation: युजर गट पहाण्याची क्षमता.
            label: पहा
          write:
            explanation: युजर गट एडिट करण्याची क्षमता.
            label: एडिट करा
        explanation: माहितीची देवाणघेवाण करू शकणाऱ्या युजर्सच्या टीमचे किंवा सहयोगी गटाचे प्रतिनिधित्व करते. व्यवस्थापक सामान्यतः त्यांच्या युजर गटांमध्ये सामाजिक कार्यकर्त्यांनी व्यवस्थापित केलेल्या सर्व नोंदी पाहू शकतात.
        label: यूजर गट
      webhook:
        actions:
          read:
            label: पहा
            explanation: API द्वारे वेबहुक कॉन्फिगरेशनची सूची तयार करण्याची आणि त्यांचे पुनरावलोकन करण्याची क्षमता
          write:
            label: एडिट करा
            explanation: API द्वारे वेबहुक कॉन्फिगरेशन तयार करण्याची आणि एडिट करण्याची क्षमता
          create:
            explanation: API द्वारे वेबहुक कॉन्फिगरेशन तयार करण्याची क्षमता
            label: तयार करा
          delete:
            explanation: API द्वारे वेबहुक कॉन्फिगरेशन हटवण्याची क्षमता
            label: हटवा
          manage:
            label: व्यवस्थापित करा (या संसाधन प्रकारासाठीच्या सर्व परवानग्या)
            explanation: इतर प्रणालींना प्रायमेरो वेबहुक्स ऍक्सेस करणाऱ्या सिस्टम भूमिकांसाठी वापरले जाते. डेव्हलपर नसलेल्या व्यक्तींच्या वापरासाठी शिफारस केलेली नाही.
