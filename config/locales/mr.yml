          export_json:
            explanation: "युजर शोध विनंती लिस्ट किंवा शोध विनंती शो पेजेसवरून एक JSON फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये युजरला ॲक्सेस असलेल्या एक, अनेक किंवा सर्व शोध विनंतींसाठी, त्याला ॲक्सेस असलेल्या सर्व फील्ड्सचा समावेश असतो. हा एक्सपोर्ट मुख्यत्वेकरून अशा लोकांसाठी वापरला जातो ज्यांना सध्याच्या प्रायमेरो सिस्टीममधून शोध विनंती एक्सपोर्ट करून त्या दुसऱ्या प्रायमेरो सिस्टीममध्ये किंवा दुसऱ्या इन्फॉर्मेशन मॅनेजमेंट सिस्टीममध्ये इम्पोर्ट करायच्या आहेत. JSON फॉरमॅट मशीन-रीडेबल आहे आणि बहुतेक वापरकर्त्यांसाठी तो व्यावहारिक नाही."
