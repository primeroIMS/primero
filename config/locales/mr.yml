            explanation: "रेकॉर्ड तयार झाल्यापासून, जे युजर्स सध्याचे रेकॉर्ड मालक नाहीत, त्यांनी केलेल्या सर्व प्रवेशांचा (पाहणे आणि अद्यतने) इतिहास युजर पाहू शकतो."
            label: "प्रवेश नोंद "
          create:
            explanation: नोंदणी रेकॉर्ड तयार करण्याची क्षमता.
            label: तयार करा
          enable_disable_record:
            explanation: नोंदणी रेकॉर्ड निष्क्रिय किंवा सक्रिय करण्याची क्षमता. 'निष्क्रिय' केलेले  नोंदणी रेकॉर्ड डीफॉल्टनुसार नोंदणीच्या यादीत दिसत नाहीत. युजर्स फिल्टर लागू करून नोंदणीच्या यादीत निष्क्रिय केलेले नोंदणी रेकॉर्ड पाहू शकतात.
            label: "सक्रिय / निष्क्रिय "
          export_csv:
            explanation: 'यूजर नोंदणी यादी किंवा नोंदणी दाखवा पेजेसवरून एक CSV फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये यूजरला प्रवेश असलेल्या एक, अनेक किंवा सर्व नोंदणी रेकॉर्डसाठी, सध्याच्या यूजरला उपलब्ध असलेली सर्व फील्ड्स समाविष्ट असतात. टीप: CSV एक्सपोर्टमध्ये नॉन-लॅटिन अक्षरे (उदा. अरबी, बांगला) वाचनीय स्वरूपात दिसत नाहीत.'
            label: एक्सपोर्ट CSV
          export_json:
            explanation: "युजर नोंदणी लिस्ट किंवा नोंदणी शो पेजेसवरून एक JSON फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये युजरला ॲक्सेस असलेल्या सर्व फील्ड्सचा समावेश असतो. JSON फॉरमॅट मशीनद्वारे वाचता येतो, पण तो बहुतेक युजर्ससाठी व्यावहारिक नाही."
            label: एक्सपोर्ट JSON
          export_xls:
            explanation: 'युजर नोंदणी लिस्ट किंवा नोंदणी शो पेजेसवरून एक XLS फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये युजरला ॲक्सेस असलेल्या सर्व फील्ड्सचा समावेश असतो. टीप: XLS फॉरमॅटमध्ये नॉन-लॅटिन अक्षरे (उदा. अरबी, बांगला) वाचनीय स्वरूपात दिसतात, तर CSV एक्सपोर्टमध्ये तसे होत नाही.'
            label: एक्सेल (XLS फाईल) एक्सपोर्ट
