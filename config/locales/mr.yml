      agency:
        actions:
          assign:
            explanation: "यूजर खाते तयार करताना किंवा एडिट करताना एजन्सी निवडण्याची क्षमता. जर सध्याच्या यूजरकडे ही परवानगी तसेच यूजरवर \"एजन्सी वाचणे\" परवानगी असेल, तर ते फक्त त्यांच्या स्वतःच्या एजन्सीमध्ये यूजर जोडू शकतील."
            label: नियुक्त करा
          create:
            explanation: एजन्सी तयार करण्याची क्षमता.
            label: तयार करा
          manage:
            explanation: 'यूजरला एजन्सींवर सर्व उपलब्ध क्रिया करण्याची परवानगी देते. "व्यवस्थापित करा" परवानगीचा अर्थ मुळात "सर्वकाही" असा होतो. महत्त्वाचे: यामुळे नवीन एजन्सी तयार करण्याची क्षमता देखील मिळते.'
            label: व्यवस्थापित करा (या संसाधन प्रकारासाठीच्या सर्व परवानग्या)
          read:
            explanation: एजन्सी पाहण्याच्या क्षमता.
            label: पहा
          write:
            explanation: एजन्सींविषयीची माहिती एडिट करण्याची क्षमता. कृपया नोंद घ्यावी की हे सिस्टममधील सर्व एजन्सींना लागू होते.
            label: एडिट करा
        explanation: प्रायमेरो वापरणाऱ्या सदस्यांच्या संस्थेचे प्रतिनिधित्व करते. एजन्सी यूजर गटांपासून स्वतंत्रपणे अस्तित्वात असतात.
        label: एजन्सी
      audit_log:
        actions:
          read:
            explanation: "यूजरला सिस्टीममध्ये केलेल्या सर्व कृतींची सूची पाहण्याची आणि फिल्टर करण्याची मंजूरी देते, जी यूजर, कृतीचा प्रकार, रेकॉर्ड ID आणि कृतीची वेळ यानुसार विभागलेली असते. हे राष्ट्रीय-स्तरीय किंवा एजन्सी-स्तरीय प्रशासकांसाठी सर्वोत्तम आहे, कारण यात सिस्टममधील सर्व यूजरनी केलेल्या कृती दिसतात. कृपया लक्षात घ्या की लेखापरीक्षण नोंद प्रत्येक कृतीमध्ये समाविष्ट असलेल्या रेकॉर्डबद्दलची वैयक्तिक ओळखण्यायोग्य माहिती प्रदर्शित करत नाही."
