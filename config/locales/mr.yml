            label: एक्सपोर्ट केस PDF
          export_photowall:
            explanation: यूजरला केस यादी पेजवरून निवडलेल्या सर्व केसेसचे फोटो असलेली फाईल एक्सपोर्ट करण्याची परवानगी देते. ही एक्सपोर्ट प्रामुख्याने कुटुंबाचा शोध आणि पुनर्मिलन उपक्रमांसाठी वापरली जाते. हे फक्त केस यादी पेजवरूनच केले जाते.
