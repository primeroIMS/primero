      title: "9. सरासरी शिफारसी"
      label: "प्रत्येक केसमागे सरासरी रेफरल "
      helptext: |
        हा निर्देशक, केस सक्रिय/चालू असो वा बंद, (सर्व प्रकारच्या सेवांसह)
        प्रत्येक नोंदवलेल्या केससाठी केलेल्या रेफरलची सरासरी संख्या मोजतो. यामध्ये केवळ 
        प्लॅटफॉर्मद्वारे केलेल्या रेफरलचीच नव्हे, तर केस टॅबवर नोंदवलेल्या रेफरलचाही समावेश आहे.
    referrals_per_service:
      title: "प्रत्येक सेवेसाठी रेफरल "
    average_followup_meetings_per_case:
      title: "10. प्रत्येक केसमागे सरासरी फॉलोअप बैठका"
      label: "प्रत्येक केसमागे सरासरी फॉलोअप बैठका"
      helptext: |
        हा निर्देशक प्लॅटफॉर्मवरील प्रत्येक केस कार्यकर्त्याद्वारे प्रत्येक सक्रिय केससाठी आयोजित केलेल्या फॉलो-अप मीटिंगची सरासरी संख्या मोजतो. फॉलो-अप मीटिंग म्हणजे प्राथमिक मुलाखत/माहिती दिल्यानंतर केस वर्कर आणि सर्वाइवर यांच्यात होणारी भेट.
    time_from_case_open_to_close:
      title: "11. केस सुरू झाल्यापासून ते बंद होईपर्यंतचा कालावधी"
      time: "वेळ"
      percent: "केसेसची टक्केवारी"
      helptext: |
        हा निर्देशक केसेस किती काळ खुली ठेवली जातात, यूजर संस्थेला प्रारंभिक अहवाल दिल्यापासून ते प्रकरण बंद होईपर्यंत प्रकरण व्यवस्थापन 
        प्रक्रियेला किती वेळ लागतो, हे मोजतो. हा कालावधी खालील
        कालमर्यादेत विभागलेला आहे: 1 महिन्यापेक्षा कमी; 1 ते 3 महिन्यांच्या दरम्यान; 
        3-6 महिन्यांच्या दरम्यान; 6 महिन्यांपेक्षा जास्त.
    case_closure_rate:
      title: "12. केस बंद करण्याची संख्या"
      reporting_site: "रिपोर्टिंग साइट"
      helptext: |
        हा निर्देशक प्रत्येक रिपोर्टिंग साइटवर दरमहा बंद केलेल्या केसेसची संख्या मोजतो. रिपोर्टिंग साइट 
        म्हणजे अशी साइट जिथे यूजर संस्था सेवा पुरवत आहे आणि जिथे 
        सेवा प्रदात्याला घटनेची माहिती देण्यात आली होती.
    client_satisfaction_rate:
      title: "13. क्लायंट समाधानाचे प्रमाण"
      label: "क्लायंट समाधान"
      invalid: "आम्ही सध्या याची गणना करू शकत नाही."
      helptext: |
        हा निर्देशक, क्लायंट अभिप्राय सर्वेक्षण पूर्ण केलेल्या आणि त्यांना प्रदान केलेल्या केस व्यवस्थापन सेवांबद्दल समाधानी असलेल्या सर्वाइवरची टक्केवारी मोजतो. हा निर्देशक, सर्वाइवरला सेवा प्रदान करणाऱ्या केस वर्कर व्यतिरिक्त तर कर्मचाऱ्याने GBVIMS+ वर क्लायंट अभिप्राय फॉर्म पूर्ण केल्यावर आधारित असतो.
    supervisor_to_caseworker_ratio:
      title: "14. पर्यवेक्षक आणि केस वर्कर यांचे गुणोत्तर"
      label: "पर्यवेक्षकामागे केस वर्कर्स"
      helptext: |
        हा निर्देशक म्हणजे एका पर्यवेक्षकाच्या देखरेखीखाली असलेल्या केस कार्यकर्त्यांची संख्या: पर्यवेक्षक ते केस 
        वर्कर्सची गुणोत्तर. ही गणना प्लॅटफॉर्मवर नेमून दिलेल्या प्राणलीमधील भूमिकांवर आधारित आहे.
    case_load:
      title: "15. केसचा भार"
      case_load: "केसचा भार"
      percent: "केसचा भार असलेल्या केस कर्मचाऱ्यांची टक्केवारी"
      10cases: "<10 केसेस"
      20cases: "11 - 20 केसेस"
      21-30cases: "21 - 30 केसेस"
      30cases: "> 30 केसेस"
      helptext: |
        हा निर्देशक सक्रिय केसेसच्या आधारावर, प्रत्येक सक्रिय केस कर्मचाऱ्यामागील सरासरी केस भार मोजतो.
         केसेसचे केस कर्मचाऱ्यांशी असलेले गुणोत्तर खालील विभागणीनुसार विभागले जाते: 10 पेक्षा कमी 
        चालू केसेस, 10-20 चालू केसेस, 21-30 चालू केसेस, 30 पेक्षा जास्त चालू केसेस.
    date_range_dialog:
      title: "सानुकूल तारीख श्रेणी"
      description: "हा बदल लागू झाल्यावर, खालील दोन तारखांच्या दरम्यानचा डेटा निवडला जाईल."
      apply: 'लागू करा'
      from: 'पासून'
      to: 'पर्यन्त'
      aria-labels:
        from: "या तारखेनंतरचा डेटा निवडला जाईल."
        to: "या तारखेआधीचा डेटा निवडला जाईल."

