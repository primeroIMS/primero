        actions:
          assign:
            explanation: "युजरला एखादी घटना तिच्या मूळ नोंद मालकाकडून सीस्टीममधील इतर कोणत्याही युजरला पाठवण्याची मंजूरी देते. ज्या घटना आधीच केसशी जोडलेल्या आहेत ते नियुक्त केले जाऊ शकत नाहीत; त्याऐवजी तुम्हाला जोडलेली केस पुन्हा नियुक्त करावी लागेल, ज्यामुळे घटनांच्या रेकॉर्डची मालकी अपडेट होईल."
            label: नियुक्त करा
          change_log:
            explanation: रेकॉर्ड तयार झाल्यापासून त्यात केलेल्या सर्व बदलांचा इतिहास युजर पाहू शकतो. यामध्ये सर्व फील्डसाठी नोंदवलेल्या मूल्यांचा समावेश असतो.
            label: बदल नोंद
          access_log:
            explanation: "रेकॉर्ड तयार झाल्यापासून, जे युजर्स सध्याचे रेकॉर्ड मालक नाहीत, त्यांनी केलेल्या सर्व प्रवेशांचा (पाहणे आणि अद्यतने) इतिहास युजर पाहू शकतो."
            label: "प्रवेश नोंद "
          create:
            explanation: घटना तयार करण्याची क्षमता.
            label: तयार करा
          enable_disable_record:
            explanation: घटना निष्क्रिय किंवा सक्रिय करण्याची क्षमता. 'निष्क्रिय' केलेल्या घटना  डीफॉल्टनुसार घटनांच्या यादीत दिसत नाहीत. युजर्स फिल्टर लागू करून घटनांच्या यादीत निष्क्रिय केलेल्या घटना पाहू शकतात.
            label: "सक्रिय / निष्क्रिय "
          export_case_pdf:
            explanation: "यूजर घटना यादी किंवा घटना दाखवा पेजेसवरून एक PDF फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये यूजरला प्रवेश असलेल्या एक, अनेक किंवा सर्व केसेससाठी, सध्याच्या यूजरला उपलब्ध असलेली सर्व फील्ड्स समाविष्ट असतात. PDF एक्सपोर्ट फाईलमध्ये, माहिती प्रथम केसनुसार सूचीबद्ध केली जाते आणि त्यानंतर ज्या फॉर्मवर माहिती दिसते त्यानुसार तिची पुढील रचना केली जाते."
            label: एक्सपोर्ट PDF
          export_csv:
            explanation: "युजर घटना लिस्ट किंवा घटना शो पेजेसवरून एक CSV फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये युजरला ॲक्सेस असलेल्या एक, अनेक किंवा सर्व घटनां साठी, युजरला ॲक्सेस असलेल्या सर्व फील्ड्सचा समावेश असतो."
            label: एक्सपोर्ट CSV
          export_custom:
            explanation: युजर XLS फाइलमध्ये एक्सपोर्ट करण्यासाठी विशिष्ट फॉर्म किंवा फील्ड निवडू शकतो.
            label: सानुकूल एक्सपोर्ट
          export_incident_recorder_xls:
            explanation: "युजर एक विशेष XLS फाईल एक्सपोर्ट तयार करू शकतो, ज्यामुळे GBV घटना रेकॉर्डर टूलसोबत डेटाची देवाणघेवाण करता येते."
            label: घटना रेकॉर्डर xls एक्सपोर्ट करा
          export_mrm_violation_xls:
            explanation: युजर MRM उल्लंघनांसाठी एक विशेष एक्सेल (XLS फाईल) एक्सपोर्ट तयार करू शकतो. ही सुविधा घटना शो पेजवर आणि घटना लिस्टवर उपलब्ध आहे.
            label: MRM उल्लंघने एक्सेलमध्ये एक्सपोर्ट करा (XLS फाइल)
          export_json:
            explanation: "यूजर घटना यादी किंवा घटना दाखवा पेजेसवरून एक JSON फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये यूजरला प्रवेश असलेल्या एक, अनेक किंवा सर्व केसेससाठी, त्याला उपलब्ध असलेल्या सर्व फील्ड्सचा समावेश असतो. हा एक्सपोर्ट मुख्यत्वेकरून अशा लोकांसाठी वापरला जातो ज्यांना सध्याच्या प्रायमेरो सिस्टीममधून केसेस एक्सपोर्ट करून त्या दुसऱ्या प्रायमेरो सिस्टीममध्ये किंवा दुसऱ्या माहिती व्यवस्थापन सिस्टीममध्ये इम्पोर्ट करायच्या आहेत. JSON फॉरमॅट मशीन-रीडेबल आहे आणि बहुतेक यूजरसाठी तो व्यावहारिक नाही."
            label: एक्सपोर्ट JSON
          export_list_view_csv:
            explanation: "यूजर घटना यादी पेजवरून एक CSV फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये तीच फील्ड्स असतात जी त्या यूजरसाठी घटना यादीवर दिसतात. हे फक्त घटना यादी पेजवरूनच केले जाते."
            label: एक्सपोर्ट लिस्ट व्ह्यू CSV
          export_pdf:
            explanation: "यूजर घटना यादी किंवा घटना दाखवा पेजेसवरून एक PDF फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये यूजरला प्रवेश असलेल्या एक, अनेक किंवा सर्व केसेससाठी, सध्याच्या यूजरला उपलब्ध असलेली सर्व फील्ड्स समाविष्ट असतात. PDF एक्सपोर्ट फाईलमध्ये, माहिती प्रथम केसनुसार सूचीबद्ध केली जाते आणि त्यानंतर ज्या फॉर्मवर माहिती दिसते त्यानुसार तिची पुढील रचना केली जाते."
            label: एक्सपोर्ट PDF
          export_xls:
            explanation: "यूजर घटना यादी किंवा घटना दाखवा पेजेसवरून एक XLS फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये यूजरला प्रवेश असलेल्या एक, अनेक किंवा सर्व केसेससाठी फॉर्म्स किंवा फील्ड्सचा एक सानुकूल संच असतो. या एक्सपोर्टमध्ये, प्रत्येक फॉर्म XLS फाईलमधील स्वतःच्या टॅबमध्ये दर्शविला जातो. यूजर कस्टम एक्सपोर्ट मॉडेलचा वापर करून, एक्सपोर्टमध्ये कोणते फॉर्म्स किंवा फील्ड्स समाविष्ट करायचे आहेत ते निवडू शकतो. कृपया लक्षात घ्या की, वापरकर्ते एक्सपोर्टमध्ये फक्त तेच फॉर्म्स आणि फील्ड्स समाविष्ट करू शकतात, जे त्यांना ॲप्लिकेशनमध्ये केस पाहताना आधीपासूनच दिसत असतील."
            label: एक्सेल (XLS फाईल) एक्सपोर्ट
          flag:
            explanation: घटनेला फ्लॅग जोडण्याची क्षमता. ही परवानगी असलेले यूजर्स त्यांनी घटनेला लावलेले फ्लॅग काढून टाकू शकतात.
            label: फ्लॅग
          resolve_any_flag:
            explanation: "फ्लॅग कोणीही तयार केला असला तरी, यूजरला रेकॉर्डवरील कोणत्याही फ्लॅगचे निराकरण करण्याची परवानगी देते."
            label: कोणत्याही फ्लॅगचे निराकरण करा
          flag_update:
            explanation: "फ्लॅग कोणीही तयार केला असला तरी, यूजरला रेकॉर्डवरील कोणताही फ्लॅग अपडेट करण्याची परवानगी देते."
            label: फ्लॅग अपडेट करा
          import:
            explanation: "यूजरला CSV, एक्सेल, किंवा JSON फाईलमधून घटना इम्पोर्ट करून एक किंवा अधिक नवीन घटना तयार करण्याची परवानगी देते. माहिती योग्यरित्या इम्पोर्ट होण्यासाठी, इम्पोर्ट केलेली फाईल *अतिशय* विशिष्ट फॉरमॅटमध्ये असणे आवश्यक आहे. हे फंक्शन केवळ प्रगत तांत्रिक कौशल्ये आणि प्रायमेरोमध्ये डेटा कसा फॉरमॅट केला जातो याचे सखोल ज्ञान असलेल्या प्रशासकीय यूजर्ससाठीच उपलब्ध असावे. हे फक्त घटना यादी पेजवरूनच केले जाते."
            label: "इम्पोर्ट करा "
          remove_alert:
            explanation: "ही परवानगी यूजरला घटनेमधून इशारा काढून टाकण्याची मुभा देते. जेव्हा एखादे विशिष्ट फील्ड एडिट केले जाते, जसे की नोट्स अपडेट केल्यावर, तेव्हा सामान्यतः इशारे तयार होतात. इशारा सहसा घटनेच्याच्या पुढे पिवळ्या ठिपक्याने दर्शविले जातात."
            label: घटनेमधून इशारा काढा
          link_incident_to_case:
            explanation: युजरला निवडलेल्या केससोबत घटना जोडण्याची परवानगी देते.
            label: घटना केसशी जोडा
          manage:
            explanation: युजरला घटनांवर सर्व उपलब्ध क्रिया करण्याची परवानगी देते. 'व्यवस्थापित करा' परवानगीचा अर्थ मुळात 'सर्व काही' असा होतो.
            label: व्यवस्थापित करा (या संसाधन प्रकारासाठीच्या सर्व परवानग्या)
          read:
            explanation: एखादी घटना पाहण्याची क्षमता
            label: पहा
          sync_mobile:
            explanation: "ही परवानगी सामान्यतः युजरला मोबाइल ॲप्लिकेशन वापरण्याची अनुमती देते. सर्वप्रथम, ते युजरला 'मोबाइलसाठी मार्क करा' आणि 'मोबाइलसाठी अनमार्क करा' या क्रिया पाहण्याची परवानगी देते, ज्या घटना सूची आणि घटना दर्शविणाऱ्या पृष्ठांवर दिसतात. मोबाइलसाठी एखादी घटना मार्क करणे हे सूचित करते की त्या घटनेबद्दलची माहिती युजरच्या मोबाइल डिव्हाइस आणि वेब ॲप्लिकेशन दरम्यान समक्रमण केली जावी, तर मोबाइलसाठी एखादी घटना अनमार्क केल्याने हे समक्रमण थांबते. या परवानगीशिवाय युजर्स त्यांचे मोबाइल डिव्हाइस वेब ऍप्लिकेशनशी समक्रमण करू शकत नाहीत, म्हणजेच ते घटना व्यवस्थापित करण्यासाठी मोबाइल ॲप वापरू शकत नाहीत."
            label: मोबाइल डिव्हाइसशी समक्रमित करा
          verify_mrm:
            explanation: MRM युजर उल्लंघनांची स्थिती बदलू शकतो.
            label: MRM ची पडताळणी करा
          write:
            explanation: "\"एडिट करा\" बटणावर क्लिक करून, घटनेबद्दलची माहिती अपडेट करण्याची आणि \"सेव्ह करा\" बटणावर क्लिक करण्याची क्षमता. तसेच युजरला एखादी घटना निष्क्रिय किंवा सक्रिय करण्याची परवानगी देते."
            label: एडिट करा
        explanation: "घडलेली एखादी घटना दर्शवते. ह्या सहसा गैरवर्तन किंवा हिंसाचाराच्या घटना असतात, तथापि त्या कायद्याची अंमलबजावणी करणाऱ्या अधिकाऱ्यांशी झालेल्या चकमकींसारख्या घटनांशी देखील संबंधित असू शकतात. घटना अनेकदा केसेसशी जोडलेल्या असतात."
        label: घटना
      is_manager:
        explanation: "सर्वसाधारणपणे इतर युजर्सवर देखरेख करणाऱ्या कोणत्याही युजर भूमिकेला लागू होते. यामुळे युजरला डॅशबोर्ड आणि फिल्टर्स पाहता येतात, जे त्याला टीम व्यवस्थापित करण्यास मदत करतात."
        label: "व्यवस्थापक आहे का?"
      managed_report:
        actions:
          reporting_locations_report:
            label: स्थळांचा अहवाल देणे (केसेस)
            explanation: "दिलेल्या तारखेच्या श्रेणीमध्ये नोंदवलेल्या केसेसच्या संख्येची आकडेवारी, अहवालाच्या स्थळानुसार फिल्टर करून आणि वय व लिंगानुसार विभागून पाहण्याची क्षमता. ही परवानगी युजरला इनसाइटमधून डेटा एक्सपोर्ट करण्याची देखील अनुमती देते."
          followups_report:
            label: फॉलोअप (केसेस)
            explanation: "दिलेल्या तारखेच्या श्रेणीमध्ये केलेल्या फॉलो अपच्या संख्येची आकडेवारी पाहण्याची क्षमता, जी फॉलो अपच्या प्रकारानुसार फिल्टर केलेली असते आणि वय व लिंगानुसार विभागलेली असते. ही परवानगी युजरला इनसाइटमधून डेटा एक्सपोर्ट करण्याची अनुमती देते."
          services_report:
            label: सेवा (केसेस)
            explanation: "दिलेल्या तारखेच्या श्रेणीमध्ये केलेल्या सेवांच्या संख्येची आकडेवारी, सेवेच्या प्रकारानुसार फिल्टर करून आणि वय व लिंगानुसार विभागणी करून पाहण्याची क्षमता. ही परवानगी युजरला इनसाइटमधून डेटा एक्सपोर्ट करण्याची अनुमती देते."
          protection_concerns_report:
            label: संरक्षण चिंता (केसेस)
            explanation: दिलेल्या तारखेच्या मर्यादेत नोंदवलेल्या केसेसमधील संरक्षणासंबंधीच्या चिंतांची आकडेवारी पाहण्याची क्षमता. ही परवानगी युजरला इनसाइटमधून डेटा एक्सपोर्ट करण्याची देखील अनुमती देते.
          managed_report_scope:
            label: "या भूमिकेला इनसाइट्समध्ये कोणते रेकॉर्ड दिसले पाहिजेत?"
          managed_report_scope_all:
            label: सर्व
          managed_report_scope_group:
            label: फक्त गट-आधारित डेटा
          managed_report_scope_agency:
            label: एजन्सी-आधारित डेटा फक्त
          violations:
