          protection_outcomes:
            label: संरक्षण परिणाम
            explanation: संरक्षण परिणाम मूळतः PCM मॉड्यूलसाठी विकसित केले गेले. यामध्ये सुधारित मनोसामाजिक कल्याण दर्शविणाऱ्या ग्राहकांचे % आणि संरक्षण धोक्यांमुळे कमी प्रभावित झाल्याचे नोंदवणाऱ्यांचे % समाविष्ट आहे.
          process_quality_total_cases:
