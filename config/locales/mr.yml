    delete_label: "तुम्हाला हे करायचे असल्याची खात्री आहे का? हे या कॉन्फिगरेशनची निर्मिती झाली, त्यावेळच्या सर्व सेटिंग्जचे प्रतिनिधित्व करते. एकदा तुम्ही हे कॉन्फिगरेशन हटवले, की तुम्हाला मागे जाऊन या सेटिंग्ज पुन्हा मिळवता येणार नाहीत."
    explanation: 'सेव्ह वर क्लिक केल्यास, सध्याच्या सर्व कॉन्फिगरेशन सेटिंग्जची (उदा. भूमिका, एजन्सिज, फॉर्म्स) त्या विशिष्ट क्षणी असलेली स्थिती म्हणून एक नोंद तयार होईल. एकदा सेव्ह केल्यानंतर, तुम्ही हे बदल प्रायमेरोच्या दुसऱ्या एखाद्या प्रती वर लागू करू शकता. भविष्यात, जर तुम्ही कॉन्फिगरेशनमध्ये काही बदल केले आणि ते बदल तुम्हाला पूर्ववत करायचे असतील, तर तुम्ही या कॉन्फिगरेशन नोंदीचा वापर करून, त्या विशिष्ट क्षणी अस्तित्वात असलेले सर्व कॉन्फिगरेशन बदल पुन्हा पूर्ववत करू शकता.'
