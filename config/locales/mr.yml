            explanation: फक्त PCM (संरक्षण केस व्यवस्थापन) मॉड्यूलसाठी लागू. प्रत्येक महिन्यात यशस्वीरित्या अंमलात आणलेल्या सेवा रेफरलची संख्या दर्शवते.
