  permissions:
    resource:
      case:
        actions:
          assign:
            explanation: यूजरला एखादी केस त्याच्या मूळ मालकाकडून सिस्टममधील इतर कोणत्याही यूजरकडे पाठवण्याची मंजूरी देते. या कृतीसाठी मुलाच्या संमतीची आवश्यकता नाही. हस्तांतरणाच्या विपरीत, प्राप्तकर्त्याला हे काम स्वीकारण्याची किंवा नाकारण्याची संधी दिली जात नाही.
          assign_within_agency:
            explanation: यूजरला एखादी केस त्याच्या मूळ मालकाकडून सध्याच्या यूजरच्या एजन्सीमधील इतर कोणत्याही यूजरकडे पाठवण्याची परवानगी देते. या कृतीसाठी मुलाच्या संमतीची आवश्यकता नाही. हस्तांतरणाच्या विपरीत, प्राप्तकर्त्याला हे काम स्वीकारण्याची किंवा नाकारण्याची संधी दिली जात नाही.
          assign_within_user_group:
            explanation: यूजरला एखादी केस त्याच्या मूळ मालकाकडून सध्याच्या यूजरच्या यूजर गटामधील इतर कोणत्याही यूजरकडे पाठवण्याची परवानगी देते. या कृतीसाठी मुलाच्या संमतीची आवश्यकता नाही. हस्तांतरणाच्या विपरीत, प्राप्तकर्त्याला हे काम स्वीकारण्याची किंवा नाकारण्याची संधी दिली जात नाही.
          request_transfer:
            explanation: '''व्ह्यू मोडल''वर "हस्तांतरणाची विनंती" बटण उघडते. हे बटण युजरला, केसच्या सध्याच्या रेकॉर्ड मालकाला, केस विनंती करणाऱ्या युजरकडे हस्तांतरित करण्याची विनंती करणारा एक वैयक्तिक संदेश ईमेलद्वारे पाठवण्याची परवानगी देते. ज्या संदर्भांमध्ये मुले वारंवार स्थळे बदलतात, आणि दुहेरी नोंद तयार होणे टाळण्यासाठी केस वर्कर्सना मुलाच्या मागील केस वर्करने मुलाबद्दलची माहिती पाठवणे आवश्यक असते, अशा परिस्थितीत हे उपयुक्त ठरते.'
          view_photo:
            explanation: युजरला केस यादी व्ह्यूमधून केसचे फोटो पाहण्याची परवानगी देते. या परवानगीशिवाय, युजरला केस यादी टेबलमधील "फोटो" कॉलम किंवा तिथे दिसणारे फोटो आयकॉन्स दिसत नाहीत. ही परवानगी युजरला "व्ह्यू मोडल" मध्ये मुलाचे फोटो पाहण्याची अनुमती देते.
        explanation: एखाद्या मुलाचे, सर्वाइवर किंवा इतर लाभार्थ्याचे प्रतिनिधित्व करते.
      managed_report:
        actions:
          individual_children:
            explanation: MRM वैयक्तिक बालक इनसाइटमध्ये प्रवेश करण्याची क्षमता.
            label: वैयक्तिक मुले
