            label: डुप्लिकेट एक्सपोर्ट करा
          export_json:
            explanation: "यूजर केस यादी किंवा केस दाखवा पेजेसवरून एक JSON फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये यूजरला प्रवेश असलेल्या एक, अनेक किंवा सर्व केसेससाठी, त्याला उपलब्ध असलेल्या सर्व फील्ड्सचा समावेश असतो. हा एक्सपोर्ट मुख्यत्वेकरून अशा लोकांसाठी वापरला जातो ज्यांना सध्याच्या प्रायमेरो सिस्टीममधून केसेस एक्सपोर्ट करून त्या दुसऱ्या प्रायमेरो सिस्टीममध्ये किंवा दुसऱ्या माहिती व्यवस्थापन सिस्टीममध्ये इम्पोर्ट करायच्या आहेत. JSON फॉरमॅट मशीन-रीडेबल आहे आणि बहुतेक यूजरसाठी तो व्यावहारिक नाही."
