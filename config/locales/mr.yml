            explanation: "संभाव्य जुळणीशी संबंधित केस किंवा विनंती शोधाच्या ऑडिओ फाइल्स, जुळणी शोधणाऱ्या युजरला पाहता येतील की नाही हे नियंत्रित करते."
            label: ऑडिओ पहा
          view_photo:
            explanation: "संभाव्य जुळणीशी संबंधित केस किंवा विनंती शोधाचे फोटो, जुळणी शोधणाऱ्या युजरला पाहता येतील की नाही हे नियंत्रित करते."
            label: फोटो पहा
          manage:
            explanation: युजरला संभाव्य जुळण्यांवर सर्व उपलब्ध क्रिया करण्याची परवानगी देते. 'व्यवस्थापित करा' परवानगीचा अर्थ मुळात 'सर्व काही' असा होतो.
            label: व्यवस्थापन करा
        label: संभाव्य जोड
      primero_configuration:
        actions:
          manage:
            explanation: "कॉन्फिगरेशन सेव्ह करण्याची, लागू करण्याची आणि पाठवण्याची क्षमता. ही मंजूरी सामान्यतः सिस्टीम ॲडमिनिस्ट्रेटरसाठी राखीव असते."
            label: व्यवस्थापित करा (या संसाधन प्रकारासाठीच्या सर्व परवानग्या)
        label: कॉन्फिगरेशन
      referral:
        actions:
          refer:
            explanation: "याचा अर्थ असा की, जेव्हा युजर बाह्य रेफरल करतो, तेव्हा 'प्राप्तकर्त्याचा प्रकार' साठी ही भूमिका एक पर्याय म्हणून दिसेल. जर युजरने रेफरलचा प्रकार म्हणून ही भूमिका निवडली, तर जेव्हा युजर रेफरल सादर करेल तेव्हा प्रायमेरोद्वारे तयार होणाऱ्या एक्सपोर्टमध्ये फक्त तीच माहिती असेल जी या भूमिकेला प्रवेश असलेल्या फॉर्ममध्ये आढळते. म्हणून, उदाहरणार्थ, जर युजरने प्राप्तकर्त्याचा प्रकार म्हणून 'वैद्यकीय सेवा प्रदाता' निवडला, आणि वैद्यकीय सेवा प्रदाता भूमिकेला फक्त 'मूलभूत ओळख' आणि 'संरक्षण चिंता' या फॉर्ममध्ये प्रवेश असेल, तर बाह्य रेफरलसाठी प्रायमेरोद्वारे एक्सपोर्ट केलेल्या एक्सपोर्ट फाइलमध्ये फक्त तीच फील्ड्स असतील जी त्या दोन फॉर्ममध्ये आहेत."
            label: "या भूमिकेचा वापर बाह्य रेफरलसाठी केला जाऊ शकतो का?"
        label: "रेफरल "
      registry_record:
        actions:
          change_log:
            explanation: रेकॉर्ड तयार झाल्यापासून त्यात केलेल्या सर्व बदलांचा इतिहास युजर पाहू शकतो. यामध्ये सर्व फील्डसाठी नोंदवलेल्या मूल्यांचा समावेश असतो.
            label: बदल नोंद
