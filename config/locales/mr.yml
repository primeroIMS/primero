            label: डिस्प्ले व्ह्यू पेज
          enable_disable_record:
            explanation: "केस निष्क्रिय किंवा सक्रिय करण्याची क्षमता. 'निष्क्रिय' केलेल्या केसेस डीफॉल्टनुसार केस यादीमध्ये दिसत नाहीत. यूजर फिल्टर वापरून केस यादीमध्ये निष्क्रिय केलेल्या केसेस पाहू शकतात. प्रायमेरो यूजरना केसेस हटवण्याची करण्याची परवानगी देत ​​नसल्यामुळे, यूजर पर्याय म्हणून केस निष्क्रिय करू शकतो. उदाहरणार्थ, जर यूजरने चुकून केस तयार केली असेल, किंवा केसमध्ये चुकीचा डेटा असेल, तर यूजरने ती निष्क्रिय करावी."
            label: "सक्रिय / निष्क्रिय "
          export_case_pdf:
            explanation: "यूजर केस यादी किंवा केस दाखवा पेजेसवरून एक PDF फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये यूजरला प्रवेश असलेल्या एक, अनेक किंवा सर्व केसेससाठी, सध्याच्या यूजरला उपलब्ध असलेली सर्व फील्ड्स समाविष्ट असतात. PDF एक्सपोर्ट फाईलमध्ये, माहिती प्रथम केसनुसार सूचीबद्ध केली जाते आणि त्यानंतर ज्या फॉर्मवर माहिती दिसते त्यानुसार तिची पुढील रचना केली जाते."
            label: एक्सपोर्ट केस PDF
          export_csv:
            explanation: 'यूजर केस यादी किंवा केस दाखवा पेजेसवरून एक CSV फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये यूजरला प्रवेश असलेल्या एक, अनेक किंवा सर्व केसेससाठी, सध्याच्या यूजरला उपलब्ध असलेली सर्व फील्ड्स समाविष्ट असतात. टीप: CSV एक्सपोर्टमध्ये नॉन-लॅटिन अक्षरे (उदा. अरबी, बांगला) वाचनीय स्वरूपात दिसत नाहीत.'
            label: एक्सपोर्ट CSV
          export_custom:
            explanation: "यूजर केस यादी किंवा केस दाखवा पेजेसवरून एक XLS फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये यूजरला प्रवेश असलेल्या एक, अनेक किंवा सर्व केसेससाठी फॉर्म्स किंवा फील्ड्सचा एक सानुकूल संच असतो. या एक्सपोर्टमध्ये, प्रत्येक फॉर्म XLS फाईलमधील स्वतःच्या टॅबमध्ये दर्शविला जातो. यूजर  कस्टम एक्सपोर्ट मॉडेलचा वापर करून, एक्सपोर्टमध्ये कोणते फॉर्म्स किंवा फील्ड्स समाविष्ट करायचे आहेत ते निवडू शकतो. कृपया लक्षात घ्या की, वापरकर्ते एक्सपोर्टमध्ये फक्त तेच फॉर्म्स आणि फील्ड्स समाविष्ट करू शकतात, जे त्यांना ॲप्लिकेशनमध्ये केस पाहताना आधीपासूनच दिसत असतील."
