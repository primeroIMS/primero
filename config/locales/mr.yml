            explanation: नोंदणी रेकॉर्डला फ्लॅग जोडण्याची क्षमता. ही परवानगी असलेले यूजर्स त्यांनी नोंदणी रेकॉर्डला लावलेले फ्लॅग काढून टाकू शकतात.
