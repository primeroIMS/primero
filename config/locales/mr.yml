          export_xls:
            explanation: 'युजर शोध विनंती लिस्ट किंवा शोध विनंती शो पेजेसवरून एक XLS फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये युजरला ॲक्सेस असलेल्या एक, अनेक किंवा सर्व शोध विनंतींसाठी, त्याला ॲक्सेस असलेली सर्व फील्ड्स समाविष्ट असतात. या एक्सपोर्टमध्ये, प्रत्येक फॉर्म XLS फाईलमधील त्याच्या स्वतःच्या टॅबमध्ये दर्शविला जातो. टीप: XLS फॉरमॅटमध्ये नॉन-लॅटिन अक्षरे (उदा. अरबी, बांगला) वाचनीय स्वरूपात दिसतात, तर CSV एक्सपोर्टमध्ये तसे होत नाही.'
