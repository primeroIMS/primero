          export_csv:
            explanation: "युजर शोध विनंती लिस्ट किंवा शोध विनंती शो पेजेसवरून एक CSV फाईल एक्सपोर्ट तयार करू शकतो, ज्यामध्ये युजरला ॲक्सेस असलेल्या एक, अनेक किंवा सर्व शोध विनंतींसाठी, युजरला ॲक्सेस असलेल्या सर्व फील्ड्सचा समावेश असतो."
