          receive_referral:
            explanation: "युजरला रेफरल मिळवण्याची परवानगी देते. ही परवानगी असलेले युजर्स रेफरल कृतीचे संभाव्य प्राप्तकर्ते म्हणून दिसतील, तर ही परवानगी नसलेले युजर्स, जेव्हा कोणी रेफरल मॉडेलमध्ये प्राप्तकर्ता शोधत असेल तेव्हा संभाव्य प्राप्तकर्ते म्हणून दिसणार नाहीत."
            label: रेफरल प्राप्त करा
          receive_referral_different_module:
            explanation: "वेगळ्या प्रायमेरो मॉड्यूलमध्ये तयार केलेल्या रेकॉर्डची रेफरल मिळवण्याची परवानगी युजरला देते. ही परवानगी असलेले युजर्स त्या रेकॉर्डसाठी रेफरल कृतीचे संभाव्य प्राप्तकर्ते म्हणून दिसतील, तर ही परवानगी नसलेले युजर्स , जेव्हा कोणी रेफरल मॉडेलमध्ये प्राप्तकर्ता शोधत असेल तेव्हा संभाव्य प्राप्तकर्ते म्हणून दिसणार नाहीत."
            label: वेगळ्या मॉड्यूलमधील यूजरकडून रेफरल मिळवा
          receive_transfer:
            explanation: "युजरला हस्तांतरण मिळवण्याची परवानगी देते. ही परवानगी असलेले युजर्स हस्तांतरण कृतीचे संभाव्य प्राप्तकर्ते म्हणून दिसतील, तर ही परवानगी नसलेले युजर्स, जेव्हा कोणी हस्तांतरण मॉडेलमध्ये प्राप्तकर्ता शोधत असेल तेव्हा संभाव्य प्राप्तकर्ते म्हणून दिसणार नाहीत."
            label: हस्तांतरण प्राप्त करा
          referral:
            explanation: "एका युजरला दुसऱ्या युजरलाला केसचा ॲक्सेस तात्पुरता देण्याची परवानगी देते. रेफरल स्वीकारणारा युजर, संदर्भित केलेल्या केसवर त्याच सर्व क्रिया करू शकेल, ज्या तो स्वतःच्या केसेसवर करू शकतो. जेव्हा प्राप्तकर्त्याला केसच्या ॲक्सेसची आवश्यकता नसते, तेव्हा तो शिफारसी आणि हस्तांतरण सबफॉर्ममधील \"पूर्ण झाले\" बटणावर क्लिक करू शकतो आणि त्याचा केसवरील ॲक्सेस संपुष्टात येईल. तुम्ही फक्त अशाच युजरला केस संदर्भित करू शकता, ज्याच्या भूमिकेमध्ये शिफारसी स्वीकारण्याची क्षमता आहे."
            label: शिफारस
          referral_from_service:
            explanation: "युजरला सेवा सबफॉर्मवर 'संदर्भ द्या' बटण पाहण्याची परवानगी देते. जेव्हा युजर या बटणावर क्लिक करतो, तेव्हा रेफरल मॉडेल दिसेल, ज्यामध्ये सेवा प्रकार, एजन्सी, सेवा प्रदाता आणि स्थळ ही फील्ड्स निष्क्रिय असतील, परंतु युजरने ज्या सेवा सबफॉर्मवर संदर्भ बटणावर क्लिक केले आहे, त्यामधील त्या फील्ड्सच्या माहितीने ती आपोआप भरली जातील."
            label: सेवा सबफॉर्ममधून केस संदर्भित करा
          remove_assigned_users:
            explanation: "युजरला \"इतर नियुक्त युजर्स\" फील्डमधून इतर युजर्सना काढून टाकण्याची परवानगी देते. जर युजरला केससाठी रेफरल मिळाली असेल किंवा केससाठी हस्तांतरण मिळाले असेल, परंतु त्यांनी ते अद्याप स्वीकारले किंवा नाकारले नसेल, तर त्यांचे नाव येथे सूचीबद्ध केले जाते. जेव्हा तुम्ही 'इतर नियुक्त युजर्स' फील्डमधून एखाद्या युजरला काढून टाकता, तेव्हा तुम्ही केसवरील त्यांचा प्रवेश काढून टाकता. म्हणून, ही परवानगी असलेले युजर्स, ज्या युजर्सना पूर्वी केससाठी रेफरल मिळाल्या आहेत किंवा ज्यांचे हस्तांतरण अद्याप पेंडिंग आहे, त्यांच्याकडून केसचा ॲक्सेस काढून टाकू शकतात. लक्षात ठेवा की ही परवानगी तेव्हाच काम करते जेव्हा सध्याच्या युजरकडे केस एडिट करण्याची क्षमता देखील असते."
            label: इतर नियुक्त युजर्सना काढून टाका (संदर्भित युजर्सकडून केसचा ॲक्सेस परत घेणे)
          reopen:
            explanation: युजरला सध्या बंद असलेली केस पुन्हा उघडण्याची परवानगी देते.
            label: पुन्हा उघडा
          request_approval_action_plan:
            explanation: "युजरला (सहसा केस वर्करला) त्यांच्या व्यवस्थापकाकडे त्यांच्या केसच्या %{approval_label} साठी विनंती करण्याची मंजूरी देते."
            label: "%{approval_label} मंजूरीची विनंती करा"
          request_approval_assessment:
            explanation: "युजरला (सहसा केस वर्करला) त्यांच्या व्यवस्थापकाकडे त्यांच्या केसच्या %{approval_label} साठी विनंती करण्याची मंजूरी देते."
            label: "%{approval_label} मंजूरीची विनंती करा"
          request_approval_bia:
            explanation: "युजरला (सहसा केस वर्करला) त्यांच्या व्यवस्थापकाकडे त्यांच्या केसच्या %{approval_label} साठी विनंती करण्याची मंजूरी देते."
            label: "%{approval_label} मंजूरीची विनंती करा"
          request_approval_case_plan:
            explanation: "युजरला (सहसा केस वर्करला) त्यांच्या व्यवस्थापकाकडे त्यांच्या केसच्या %{approval_label} साठी विनंती करण्याची मंजूरी देते."
            label: "%{approval_label} मंजूरीची विनंती करा"
          request_approval_closure:
            explanation: "युजरला (सहसा केस वर्करला) त्यांच्या व्यवस्थापकाकडे त्यांच्या केसच्या %{approval_label} साठी विनंती करण्याची मंजूरी देते."
            label: "%{approval_label} मंजूरीची विनंती करा"
          request_approval_gbv_closure:
            explanation: "युजरला (सहसा केस वर्करला) त्यांच्या व्यवस्थापकाकडे त्यांच्या केसच्या %{approval_label} साठी विनंती करण्याची मंजूरी देते."
            label: "%{approval_label} मंजूरीची विनंती करा"
          request_transfer:
            explanation: "'व्ह्यू मोडल'वर \"हस्तांतरणाची विनंती\" बटण उघडते. हे बटण युजरला, केसच्या सध्याच्या रेकॉर्ड मालकाला, केस विनंती करणाऱ्या युजरकडे हस्तांतरित करण्याची विनंती करणारा एक वैयक्तिक संदेश ईमेलद्वारे पाठवण्याची परवानगी देते. ज्या संदर्भांमध्ये मुले वारंवार स्थळे बदलतात, आणि दुहेरी नोंद तयार होणे टाळण्यासाठी केस वर्कर्सना मुलाच्या मागील केस वर्करने मुलाबद्दलची माहिती पाठवणे आवश्यक असते, अशा परिस्थितीत हे उपयुक्त ठरते."
            label: हस्तांतरणाची विनंती करा
          search_owned_by_others:
            explanation: "युजरला अशा नोंदी शोधण्याची परवानगी देते ज्यांमध्ये त्यांना सामान्यतः प्रवेश नसतो, एकतर कारण ते त्या केसच्या नोंदीचे मालक नाहीत किंवा (व्यवस्थापकांसाठी) कारण नोंदीचा मालक त्यांच्या युजर गटांमध्ये नाही. लक्षात घ्या की, युजरला शोध परिणामांच्या दृश्यात केस दिसेल, परंतु ते त्या केसच्या केस दाखवा पेजवर क्लिक करू शकणार नाहीत, म्हणजेच त्यांना केसबद्दल कोणतीही सविस्तर माहिती पाहता येणार नाही. "
            label: इतर यूजर्सच्या मालकीच्या केस रेकॉर्ड शोधा
          service_provision_incident_details:
            explanation: "युजरला घटना जोडा मोडेलच्या तळाशी \"सेवा तरतूद सेव्ह करा आणि जोडा\" नावाचे बटण दिसू देते. या बटणावर क्लिक केल्याने घटनेबद्दल सध्या प्रविष्ट केलेली माहिती जतन होते आणि त्यानंतर युजरला थेट सेवा तरतूद जोडा मॉडेलवर नेले जाते. ही कृती घटना जोडा आणि सेवा तरतूद जोडा या कृतींशी थेट जोडलेली असल्यामुळे, एखाद्या भूमिकेला ही परवानगी तेव्हाच देणे योग्य ठरते, जेव्हा त्या भूमिकेकडे \"दुसऱ्या युजरच्या केसमध्ये घटनेचा तपशील जोडा\" आणि \"दुसऱ्या युजरच्या केसमध्ये सेवा तरतूद जोडा\" या परवानग्या देखील असतील."
            label: घटना तपशील मोडलवरील सेवा तरतूद जोडा बटण पहा
          services_section_from_case:
            explanation: "शोध परिणामांमध्ये सापडलेल्या, परंतु ज्यात तुम्हाला प्रवेश नाही अशा केससाठी सेवा सबफॉर्ममध्ये नोंद जोडण्याची क्षमता. यूजर शोध परिणामांच्या पृष्ठावरून एक किंवा अधिक केस निवडून, नंतर कृती मेनूमधून \"सेवा तरतूद जोडा\" निवडून ही कृती करतो. त्यानंतर यूजरला सेवा सबफॉर्मवरील सर्व फील्ड्स असलेला एक मोडल दिसतो, जिथे ते सेवेबद्दल माहिती प्रविष्ट करून सबमिट करू शकतात. ही कृती केवळ शोध परिणामांच्या पृष्ठावरूनच केली जाऊ शकत असल्याने, एखाद्या भूमिकेकडे 'इतर यूजर्सच्या मालकीच्या केस रेकॉर्डचा शोध घ्या' ही परवानगी असेल तरच त्यांच्याकडे ही परवानगी असणे अर्थपूर्ण ठरते."
            label: दुसऱ्या यूजरच्या केसमध्ये सेवा तरतूद जोडा
          service_own_entries_only:
            explanation: "ही परवानगी असलेले युजर्स, जेव्हा त्यांच्याकडे संदर्भित केलेल्या केसमध्ये प्रवेश करतात, तेव्हा त्यांना सेवा सबफॉर्ममध्ये फक्त त्याच नोंदी दिसतील ज्यासाठी त्यांना सेवा प्रोव्हायडर म्हणून निवडले गेले आहे. याचा वापर सामान्यतः सेवा प्रोव्हायडर भूमिकांसाठी केला जातो."
            label: माझ्या स्वतःच्या सेवा सबफॉर्ममधील नोंदींमध्ये ॲक्सेस करा
          sync_external:
            explanation: रेकॉर्डला बाह्य माहिती व्यवस्थापन सीस्टीमसोबत समक्रमित करण्याची क्षमता
            label: बाह्य माहिती व्यवस्थापन प्रणालीशी समक्रमण करा
          sync_mobile:
            explanation: युजरला ऑफलाइन वापरासाठी केसेस कॅश करण्याची परवानगी देते.
            label: ऑफलाइनसाठी मार्क करा
          transfer:
            explanation: "युजरला एखादी केस त्याच्या सध्याच्या रेकॉर्ड मालकाकडून, हस्तांतरण स्वीकारण्याची क्षमता असलेल्या सीस्टीममधील कोणत्याही युजरकडे पाठवण्याची मंजूरी देते. जोपर्यंत हस्तांतरण स्वीकारणारा ते \"स्वीकारत\" नाही, तोपर्यंत केसचा रेकॉर्ड मालक बदलत नाही. याउलट, जर प्राप्तकर्त्याने हस्तांतरण \"नाकारले\" तर, प्राप्तकर्ता त्या केसवरील आपला अधिकार गमावतो आणि त्याचा मूळ मालक कायम राहतो."
            label: हस्तांतरण करा
          view_photo:
            explanation: "युजरला केस यादी व्ह्यूमधून केसचे फोटो पाहण्याची परवानगी देते. या परवानगीशिवाय, युजरला केस यादी टेबलमधील \"फोटो\" कॉलम किंवा तिथे दिसणारे फोटो आयकॉन्स दिसत नाहीत. ही परवानगी युजरला \"व्ह्यू मोडल\" मध्ये मुलाचे फोटो पाहण्याची अनुमती देते."
            label: केस यादी व्ह्यूमधून फोटो पहा
          view_incident_from_case:
            explanation: "\"एखादी केस पाहताना, युजरला त्या केसशी संबंधित घटनांची यादी, तसेच प्रत्येकाविषयी काही सारांश माहिती दिसू शकते."
            label: केसमधील घटना पहा
          view_protection_concerns_filter:
            explanation: युजरला केस यादी पेजवर संरक्षणासंबंधी चिंतांचा फिल्टर पाहण्याची परवानगी देते.
            label: केस यादी पेजवर संरक्षणासंबंधी चिंता फिल्टर पहा
          view_registry_record:
            explanation: "यूजरला एखाद्या केसशी जोडलेल्या कोणत्याही नोंदणीची माहिती पाहण्याची सुविधा देते. तसेच, यूजरला त्या प्रकरणाशी संबंधित नोंदणीचा ​​तपशील फॉर्म पाहण्याची सुविधा देखील देते."
            label: केसमधील नोंदणी रेकॉर्ड पहा
          write:
            explanation: "\"एडिट करा\" बटणावर क्लिक करून, केसमधील माहिती अपडेट करण्याची आणि \"सेव्ह करा\" बटणावर क्लिक करण्याची क्षमता."
            label: एडिट करा
          accept_or_reject_transfer:
            explanation: "तुमच्या टीममधील दुसऱ्या युजरच्या वतीने बदली स्वीकारण्याची किंवा नाकारण्याची परवानगी देते (उदाहरणार्थ, पर्यवेक्षकाने त्यांच्या सामाजिक कार्यकर्त्याला पाठवलेली बदली स्वीकारणे)."
            label: तुमच्या टीममधील दुसऱ्या युजरची बदली स्वीकारा किंवा नाकारा.
          list_case_names:
            explanation: "व्यवस्थापकांना सहसा केस यादीमध्ये केसेसची नावे दिसत नाहीत. जर व्यवस्थापकाकडे ही परवानगी असेल, तर त्यांना यादीमध्ये नावे दिसू शकतील."
            label: "व्यवस्थापक असल्यास, केस यादीमध्ये केसची नावे पाहता येतात."
          mark_for_offline:
            explanation: युजरला ऑफलाइन वापरासाठी केस कॅश करण्याची परवानगी देते.
            label: ऑफलाइनसाठी मार्क करा
          view_family_record:
            explanation: "युजर्स केसवरील 'कौटुंबिक रेकॉर्ड' फॉर्म पाहू शकतात, ज्यामध्ये केसच्या कौटुंबिक रेकॉर्डची लिंक समाविष्ट आहे."
            label:  केसमधील कौटुंबिक रेकॉर्ड पहा
          case_from_family:
            explanation: युजर्स कौटुंबिक तपशील सबफॉर्ममध्ये केसच्या कुटुंबातील सदस्यांपैकी एकासाठी केस तयार करू शकतात. लक्षात घ्या की या दोन केसमध्ये लिंक तयार करण्यासाठी एक कौटुंबिक रेकॉर्ड आपोआप तयार केले जाईल.
            label: कौटुंबिक तपशिलांवरून केस तयार करा
          link_family_record:
            explanation: "युजरला अस्तित्वात असलेली कौटुंबिक रेकॉर्ड शोधून ती त्यांच्या केसशी जोडण्याची परवानगी देते. तसेच, युजर्सना केसमधून कौटुंबिक नोंद वेगळी करण्याची परवानगी देते."
