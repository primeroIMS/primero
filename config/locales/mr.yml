        label: लेखापरीक्षण नोंद
      case:
        actions:
          add_note:
            explanation: "यूजरला \"नोंदी\" सबफॉर्ममध्ये (ज्याला कधीकधी \"टिप्पण्या\" असेही म्हटले जाते) एक नोंद जोडण्याची परवानगी देते. यूजर केस दाखवा पेजवरील \"नोंदी जोडा\" बटणावर क्लिक करून हे करतो. ही कृती विशेषतः अशा व्यवस्थापकांसाठी उपयुक्त आहे ज्यांना केसेस एडिट करण्याची क्षमता नाही, परंतु केस कर्मचाऱ्यासाठी केसमध्ये स्मरणपत्रे जोडायची आहेत. अशा प्रकारे, नोंद जोडणे हे फ्लॅग जोडण्यासारखेच आहे. नोंद जोडण्याचा फायदा असा आहे की, जेव्हा व्यवस्थापक केसमध्ये नोंद जोडतो, तेव्हा केस कर्मचारी त्यांच्या मोबाइल डिव्हाइसवर केस पाहत असताना त्यांना केसवर एक सूचना दिसेल."
